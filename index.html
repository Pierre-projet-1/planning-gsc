<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSC - Planning & Congés</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .flux-om { background-color: #e2e8f0; color: #475569; border-left: 3px solid #475569; }
        .flux-cs { background-color: #fef08a; color: #854d0e; border-left: 3px solid #854d0e; }
        .is-conge { background-color: #fecaca !important; color: #b91c1c; font-weight: bold; }
        th { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; padding: 10px 5px; }
        td { font-size: 11px; padding: 4px; border: 1px solid #e2e8f0; }
        .bg-conge-active { background-color: #ef4444 !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <script>
        const BIN_ID = "69b528beaa77b81da9e33a14"; 
        const API_KEY = "$2a$10$KM0Bk26gr5ZNVIpvSKTSIOs57V3dBxtizW1IjdbER1L/yjh24vaEq"; 
        const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        let state = {
            annee: 2026,
            semaine: 1,
            moisConges: new Date().getMonth(),
            anneeConges: 2026,
            data: {
                agents: [],
                camions: [],
                tournees: [],
                planning: {},
                conges: {} // Format: { "Nom Agent": ["2026-03-15", "2026-03-16"] }
            }
        };

        const JOURS_NOM = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi"];

        async function load() {
            document.getElementById('status').innerText = "⏳ Chargement...";
            try {
                const res = await fetch(`${URL}/latest`, { headers: { "X-Master-Key": API_KEY } });
                const json = await res.json();
                if (json.record) {
                    state.data = json.record;
                    if (!state.data.conges) state.data.conges = {};
                }
                document.getElementById('status').innerText = "✅ Connecté";
                renderAll();
            } catch (err) {
                document.getElementById('status').innerText = "❌ Erreur de connexion";
            }
        }

        async function sync() {
            document.getElementById('status').innerText = "⏳ Sauvegarde...";
            try {
                await fetch(URL, {
                    method: 'PUT',
                    headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                    body: JSON.stringify(state.data)
                });
                document.getElementById('status').innerText = "✅ Sauvegardé";
            } catch (err) {
                document.getElementById('status').innerText = "❌ Erreur sync";
            }
        }

        // --- UTILITAIRES ---
        function getDatesOfWeek(w, y) {
            let simple = new Date(y, 0, 1 + (w - 1) * 7);
            let dow = simple.getDay();
            let ISOweekStart = simple;
            if (dow <= 4) ISOweekStart.setDate(simple.getDate() - simple.getDay() + 1);
            else ISOweekStart.setDate(simple.getDate() + 8 - simple.getDay());
            
            let days = [];
            for (let i = 0; i < 5; i++) {
                let d = new Date(ISOweekStart);
                d.setDate(d.getDate() + i);
                days.push({
                    texte: d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' }),
                    iso: d.toISOString().split('T')[0]
                });
            }
            return days;
        }

        // --- RENDU PLANNING ---
        function renderPlanning() {
            const isPaire = state.semaine % 2 === 0;
            const weekType = isPaire ? 'paire' : 'impaire';
            const weekKey = `${state.annee}_W${state.semaine}`;
            const dates = getDatesOfWeek(state.semaine, state.annee);
            
            const firstDate = new Date(state.annee, 0, 1 + (state.semaine - 1) * 7);
            document.getElementById('plan-title').innerText = `Planning semaine n°${state.semaine} - ${firstDate.toLocaleString('fr-FR', {month: 'long'})} ${state.annee}`;

            const body = document.getElementById('plan-body');
            body.innerHTML = "";

            dates.forEach((dateObj, dayIdx) => {
                const jourIndex = dayIdx + 1; 
                const tourneesDuJour = (state.data.tournees || []).filter(t => t.type === weekType && t.jour == jourIndex);

                let agentsOccupes = [];
                tourneesDuJour.forEach(t => {
                    const rowKey = `${t.nom}_${dayIdx}`;
                    const rowData = state.data.planning[weekKey]?.[rowKey] || {};
                    ['ch', 'r1', 'r2'].forEach(role => { if(rowData[role]) agentsOccupes.push(rowData[role]); });
                });

                tourneesDuJour.forEach(t => {
                    const rowKey = `${t.nom}_${dayIdx}`;
                    const cell = state.data.planning[weekKey]?.[rowKey] || {};
                    
                    const dispos = state.data.agents.filter(a => {
                        const enConge = (state.data.conges[a] || []).includes(dateObj.iso);
                        return !agentsOccupes.includes(a) && !enConge;
                    });

                    const checkConge = (nomAgent) => {
                        if (!nomAgent) return "";
                        return (state.data.conges[nomAgent] || []).includes(dateObj.iso) ? 'is-conge' : '';
                    };

                    const tr = document.createElement('tr');
                    tr.className = "bg-white hover:bg-slate-50";
                    tr.innerHTML = `
                        <td class="font-bold text-slate-500">${dateObj.texte}</td>
                        <td class="font-black text-blue-900 uppercase">${t.nom}</td>
                        <td class="text-center"><span class="px-2 py-1 rounded text-[9px] font-bold ${t.flux==='OM'?'flux-om':'flux-cs'}">${t.flux}</span></td>
                        <td><select onchange="updatePlan('${rowKey}','camion',this.value)" class="w-full border rounded">${state.data.camions.map(c => `<option ${cell.camion===c?'selected':''}>${c}</option>`).unshift('<option value="">-</option>') && state.data.camions.map(c => `<option ${cell.camion===c?'selected':''}>${c}</option>`).join('')}</select></td>
                        <td><select onchange="updatePlan('${rowKey}','ch',this.value)" class="w-full border rounded ${checkConge(cell.ch)}"><option value="">-</option>${state.data.agents.map(a => `<option ${cell.ch===a?'selected':''}>${a}</option>`).join('')}</select></td>
                        <td><select onchange="updatePlan('${rowKey}','r1',this.value)" class="w-full border rounded ${checkConge(cell.r1)}"><option value="">-</option>${state.data.agents.map(a => `<option ${cell.r1===a?'selected':''}>${a}</option>`).join('')}</select></td>
                        <td><select onchange="updatePlan('${rowKey}','r2',this.value)" class="w-full border rounded ${checkConge(cell.r2)}"><option value="">-</option>${state.data.agents.map(a => `<option ${cell.r2===a?'selected':''}>${a}</option>`).join('')}</select></td>
                        <td><select onchange="updatePlan('${rowKey}','vidage',this.value)" class="w-full border rounded font-bold"><option value="">-</option><option ${cell.vidage==='Dépôt'?'selected':''}>Dépôt</option><option ${cell.vidage==='DRIMM'?'selected':''}>DRIMM</option></select></td>
                        <td><input type="text" value="${cell.info || ''}" onchange="updatePlan('${rowKey}','info',this.value)" class="w-full border rounded p-0.5"></td>
                        <td><input type="text" value="${cell.autres || ''}" onchange="updatePlan('${rowKey}','autres',this.value)" class="w-full border rounded p-0.5"></td>
                        <td class="text-[9px] text-emerald-600 font-bold bg-emerald-50/50">${dispos.join(', ')}</td>
                    `;
                    body.appendChild(tr);
                });
            });
        }

        function updatePlan(rowKey, field, val) {
            const key = `${state.annee}_W${state.semaine}`;
            if(!state.data.planning[key]) state.data.planning[key] = {};
            if(!state.data.planning[key][rowKey]) state.data.planning[key][rowKey] = {};
            state.data.planning[key][rowKey][field] = val;
            sync();
            renderPlanning(); 
        }

        // --- GESTION CONGES ---
        function renderConges() {
            const container = document.getElementById('conges-wrapper');
            const joursDansMois = new Date(state.anneeConges, state.moisConges + 1, 0).getDate();
            const nomsMois = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];
            
            document.getElementById('current-month-display').innerText = `${nomsMois[state.moisConges]} ${state.anneeConges}`;

            let html = `<table class="w-full border-collapse bg-white shadow-sm"><thead><tr class="bg-slate-800 text-white">`;
            html += `<th class="sticky left-0 bg-slate-900 z-10 w-32">Agent</th>`;
            for(let j=1; j<=joursDansMois; j++) html += `<th class="text-[9px] border w-8">${j}</th>`;
            html += `</tr></thead><tbody>`;

            state.data.agents.forEach(agent => {
                html += `<tr><td class="sticky left-0 bg-slate-50 font-bold border p-2 text-xs">${agent}</td>`;
                for(let j=1; j<=joursDansMois; j++) {
                    const dateIso = `${state.anneeConges}-${String(state.moisConges+1).padStart(2,'0')}-${String(j).padStart(2,'0')}`;
                    const isConge = (state.data.conges[agent] || []).includes(dateIso);
                    html += `<td onclick="toggleConge('${agent}', '${dateIso}')" class="border cursor-pointer hover:bg-blue-50 ${isConge ? 'bg-conge-active' : ''}"></td>`;
                }
                html += `</tr>`;
            });
            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        function toggleConge(agent, dateIso) {
            if(!state.data.conges[agent]) state.data.conges[agent] = [];
            const index = state.data.conges[agent].indexOf(dateIso);
            if(index > -1) state.data.conges[agent].splice(index, 1);
            else state.data.conges[agent].push(dateIso);
            renderConges();
            sync();
        }

        function changeMoisConges(delta) {
            state.moisConges += delta;
            if(state.moisConges > 11) { state.moisConges = 0; state.anneeConges++; }
            if(state.moisConges < 0) { state.moisConges = 11; state.anneeConges--; }
            renderConges();
        }

        // --- PARAMETRES ---
        function renderParams() {
            document.getElementById('list-agents').innerHTML = state.data.agents.map((a, i) => `<li class="flex justify-between p-1 border-b text-xs">${a}<button onclick="removeParam('agents',${i})" class="text-red-500">✕</button></li>`).join('');
            document.getElementById('list-camions').innerHTML = state.data.camions.map((c, i) => `<li class="flex justify-between p-1 border-b text-xs">${c}<button onclick="removeParam('camions',${i})" class="text-red-500">✕</button></li>`).join('');
            
            const tHtml = (type) => state.data.tournees.filter(t => t.type === type).map((t, i) => `
                <div class="p-2 border mb-1 text-[10px] flex justify-between bg-white">
                    <span><b>${JOURS_NOM[t.jour-1]}</b> : ${t.nom}</span>
                    <button onclick="removeTournee(${i}, '${type}')" class="text-red-400">✕</button>
                </div>`).join('');
            document.getElementById('list-tournees-impaires').innerHTML = tHtml('impaire');
            document.getElementById('list-tournees-paires').innerHTML = tHtml('paire');
        }

        function addParam(type) {
            const input = document.getElementById(`in-${type}`);
            if(!input.value.trim()) return;
            state.data[type].push(input.value.trim());
            input.value = ""; renderAll(); sync();
        }

        function addTournee() {
            const nom = document.getElementById('in-tournees').value;
            if(!nom) return;
            state.data.tournees.push({
                nom, flux: document.getElementById('in-flux').value,
                type: document.getElementById('in-freq').value,
                jour: document.getElementById('in-jour').value
            });
            document.getElementById('in-tournees').value = ""; renderAll(); sync();
        }

        function removeParam(type, idx) { state.data[type].splice(idx, 1); renderAll(); sync(); }
        function removeTournee(idx, type) { 
            const realIdx = state.data.tournees.findIndex((t, i) => t.type === type && i === i); // Simplifié pour l'exemple
            state.data.tournees.splice(realIdx, 1); renderAll(); sync(); 
        }

        function renderAll() {
            document.getElementById('week-num').innerText = state.semaine;
            document.getElementById('pair-type').innerText = (state.semaine % 2 === 0) ? "PAIRE" : "IMPAIRE";
            renderPlanning();
            renderParams();
            renderConges();
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            renderAll();
        }

        window.onload = load;
    </script>

    <header class="bg-slate-900 text-white p-4 sticky top-0 z-50 flex justify-between items-center shadow-lg">
        <div><h1 class="font-black text-xl tracking-tighter uppercase">Grand Sud Collecte</h1></div>
        <nav class="flex gap-4">
            <button onclick="showTab('tab-plan')" class="text-xs font-bold uppercase hover:text-blue-400">Planning</button>
            <button onclick="showTab('tab-conges')" class="text-xs font-bold uppercase hover:text-blue-400">Congés</button>
            <button onclick="showTab('tab-params')" class="text-xs font-bold uppercase hover:text-blue-400">Paramètres</button>
        </nav>
        <div id="status" class="text-[9px] font-mono text-blue-300">Connexion...</div>
    </header>

    <main class="max-w-[1600px] mx-auto p-6">
        
        <section id="tab-plan" class="tab-content active">
            <div class="flex items-center justify-between mb-4 bg-white p-4 rounded-xl border">
                <div class="flex items-center gap-4">
                    <button onclick="state.semaine--; renderAll()" class="px-3 py-1 bg-slate-100 rounded font-bold text-slate-500">◀</button>
                    <div class="text-center">
                        <div id="plan-title" class="text-lg font-black text-slate-800 uppercase">...</div>
                        <div class="text-[10px] text-slate-400 font-bold uppercase italic">Semaine <span id="pair-type" class="text-blue-600">...</span></div>
                    </div>
                    <button onclick="state.semaine++; renderAll()" class="px-3 py-1 bg-slate-100 rounded font-bold text-slate-500">▶</button>
                </div>
                <input type="number" value="2026" onchange="state.annee=parseInt(this.value); renderAll()" class="border rounded p-1 w-20 text-center font-bold">
            </div>

            <div class="overflow-x-auto rounded-xl border border-slate-200 shadow-lg bg-white">
                <table class="w-full text-left">
                    <thead class="bg-slate-900 text-white">
                        <tr>
                            <th style="width: 12%">Jour</th><th style="width: 12%">Tournée</th><th style="width: 5%">Flux</th>
                            <th style="width: 8%">Camion</th><th style="width: 10%">Chauffeur</th><th style="width: 10%">Ripeur 1</th>
                            <th style="width: 10%">Ripeur 2</th><th style="width: 8%">Vidage</th><th style="width: 8%">Info</th>
                            <th style="width: 8%">Autres</th><th style="width: 11%">Personnel Dispo</th>
                        </tr>
                    </thead>
                    <tbody id="plan-body"></tbody>
                </table>
            </div>
        </section>

        <section id="tab-conges" class="tab-content">
            <div class="bg-white p-6 rounded-xl border shadow-sm">
                <div class="flex justify-between items-center mb-6 border-b pb-4">
                    <h2 class="font-black text-blue-900 uppercase">Gestion des Absences / Congés</h2>
                    <div class="flex items-center gap-4 bg-slate-100 p-2 rounded-lg">
                        <button onclick="changeMoisConges(-1)" class="font-bold">◀</button>
                        <span id="current-month-display" class="font-bold min-w-[150px] text-center uppercase text-sm">...</span>
                        <button onclick="changeMoisConges(1)" class="font-bold">▶</button>
                    </div>
                    <div class="text-[10px] flex items-center gap-2">
                        <span class="w-4 h-4 bg-red-500 rounded"></span> = Agent en congé
                    </div>
                </div>
                <div id="conges-wrapper" class="overflow-x-auto"></div>
            </div>
        </section>

        <section id="tab-params" class="tab-content">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="bg-white p-4 rounded-xl border shadow-sm">
                    <h3 class="font-bold text-xs uppercase mb-4 text-blue-700">Agents & Camions</h3>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="in-agents" placeholder="Nouvel Agent" class="flex-1 border p-1 rounded text-sm">
                        <button onclick="addParam('agents')" class="bg-blue-600 text-white px-2 rounded">+</button>
                    </div>
                    <ul id="list-agents" class="mb-6"></ul>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="in-camions" placeholder="N° Camion" class="flex-1 border p-1 rounded text-sm">
                        <button onclick="addParam('camions')" class="bg-blue-600 text-white px-2 rounded">+</button>
                    </div>
                    <ul id="list-camions"></ul>
                </div>

                <div class="lg:col-span-2 bg-white p-4 rounded-xl border shadow-sm">
                    <h3 class="font-bold text-xs uppercase mb-4 text-blue-700">Configuration des Tournées</h3>
                    <div class="grid grid-cols-4 gap-2 mb-6 bg-slate-50 p-3 rounded-lg">
                        <input type="text" id="in-tournees" placeholder="Nom Tournée" class="border p-2 rounded text-sm col-span-2">
                        <select id="in-flux" class="border p-2 rounded text-sm"><option value="OM">OM</option><option value="CS">CS</option></select>
                        <select id="in-jour" class="border p-2 rounded text-sm"><option value="1">Lundi</option><option value="2">Mardi</option><option value="3">Mercredi</option><option value="4">Jeudi</option><option value="5">Vendredi</option></select>
                        <select id="in-freq" class="border p-2 rounded text-sm col-span-2"><option value="impaire">Semaine Impaire</option><option value="paire">Semaine Paire</option></select>
                        <button onclick="addTournee()" class="bg-blue-900 text-white p-2 rounded font-bold col-span-2 uppercase text-xs">Ajouter au catalogue</button>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><h4 class="text-[10px] font-black uppercase mb-2 text-indigo-500">S. Impaires</h4><div id="list-tournees-impaires"></div></div>
                        <div><h4 class="text-[10px] font-black uppercase mb-2 text-emerald-500">S. Paires</h4><div id="list-tournees-paires"></div></div>
                    </div>
                </div>
            </div>
        </section>

    </main>

</body>
</html>

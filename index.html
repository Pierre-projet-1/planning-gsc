<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSC - Planning Professionnel</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

.tab-content {display:none}
.tab-content.active {display:block}

.flux-om {
background:#e2e8f0;
color:#475569;
border-left:4px solid #475569
}

.flux-cs {
background:#fef08a;
color:#854d0e;
border-left:4px solid #854d0e
}

</style>
</head>

<body class="bg-slate-100 min-h-screen font-sans">

<script>

const BIN_ID="69b528beaa77b81da9e33a14"
const API_KEY="$2a$10$KM0Bk26gr5ZNVIpvSKTSIOs57V3dBxtizW1IjdbER1L/yjh24vaEq"
const URL=`https://api.jsonbin.io/v3/b/${BIN_ID}`

let state={
annee:2026,
semaine:1,
data:{
agents:[],
camions:[],
tournees:[],
planning:{},
conges:{}
}
}

async function load(){

document.getElementById('status').innerText="⏳ Chargement..."

try{

const res=await fetch(`${URL}/latest`,{
headers:{"X-Master-Key":API_KEY}
})

const json=await res.json()

if(json.record){

state.data={
agents:json.record.agents||[],
camions:json.record.camions||[],
tournees:json.record.tournees||[],
planning:json.record.planning||{},
conges:json.record.conges||{}
}

}

document.getElementById('status').innerText="✅ Connecté"

renderAll()

}catch(err){

document.getElementById('status').innerText="❌ Erreur connexion"

}

}

async function sync(){

document.getElementById('status').innerText="⏳ Sauvegarde..."

try{

await fetch(URL,{
method:"PUT",
headers:{
"Content-Type":"application/json",
"X-Master-Key":API_KEY
},
body:JSON.stringify(state.data)
})

document.getElementById('status').innerText="✅ Sauvegardé"

}catch(err){

document.getElementById('status').innerText="❌ Erreur sync"

}

}

function getDatesOfWeek(w,y){

let simple=new Date(y,0,1+(w-1)*7)

let dow=simple.getDay()

let ISOweekStart=simple

if(dow<=4)
ISOweekStart.setDate(simple.getDate()-simple.getDay()+1)
else
ISOweekStart.setDate(simple.getDate()+8-simple.getDay())

let days=[]

for(let i=0;i<5;i++){

let d=new Date(ISOweekStart)
d.setDate(d.getDate()+i)

days.push({
label:d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'}),
date:d
})

}

return days

}

function renderPlanning(){

const isPaire=state.semaine%2===0
const targetType=isPaire?'paire':'impaire'

const weekKey=`${state.annee}_W${state.semaine}`

const dates=getDatesOfWeek(state.semaine,state.annee)

const tournees=state.data.tournees.filter(t=>t.type===targetType)

const refDate=new Date(state.annee,0,1+(state.semaine-1)*7)

const monthName=refDate.toLocaleDateString('fr-FR',{month:'long',year:'numeric'})

document.getElementById("plan-title").innerText=
`Planning semaine n°${state.semaine} - ${monthName}`

document.getElementById("plan-header").innerHTML=`

<th class="p-2 border">Jour</th>
<th class="p-2 border">Tournée</th>
<th class="p-2 border">Flux</th>
<th class="p-2 border">Camion</th>
<th class="p-2 border">Chauffeur</th>
<th class="p-2 border">Ripeur 1</th>
<th class="p-2 border">Ripeur 2</th>
<th class="p-2 border">Vidage</th>
<th class="p-2 border">Information</th>
<th class="p-2 border">Autres</th>
<th class="p-2 border">Personnel disponible</th>

`

let html=""

dates.forEach((dayObj,dayIdx)=>{

tournees.forEach(t=>{

const cell=state.data.planning[weekKey]?.[t.nom]?.[dayIdx]||{}

const agentsUtilises=[cell.ch,cell.r1,cell.r2].filter(Boolean)

const dispo=state.data.agents
.filter(a=>!agentsUtilises.includes(a))
.join(", ")

html+=`

<tr>

<td class="border p-2 text-xs font-bold bg-slate-50">
${dayObj.label}
</td>

<td class="border p-2 text-xs font-semibold">
${t.nom}
</td>

<td class="border p-2">
<span class="px-2 py-1 text-[10px] rounded ${t.flux==='OM'?'flux-om':'flux-cs'}">
${t.flux}
</span>
</td>

<td class="border p-1">

<select onchange="updatePlan('${t.nom}',${dayIdx},'camion',this.value)" class="text-xs w-full">

<option value=""></option>

${state.data.camions.map(c=>
`<option ${cell.camion===c?'selected':''}>${c}</option>`
).join('')}

</select>

</td>

<td class="border p-1">

<select onchange="updatePlan('${t.nom}',${dayIdx},'ch',this.value)" class="text-xs w-full">

<option value=""></option>

${state.data.agents.map(a=>
`<option ${cell.ch===a?'selected':''}>${a}</option>`
).join('')}

</select>

</td>

<td class="border p-1">

<select onchange="updatePlan('${t.nom}',${dayIdx},'r1',this.value)" class="text-xs w-full">

<option value=""></option>

${state.data.agents.map(a=>
`<option ${cell.r1===a?'selected':''}>${a}</option>`
).join('')}

</select>

</td>

<td class="border p-1">

<select onchange="updatePlan('${t.nom}',${dayIdx},'r2',this.value)" class="text-xs w-full">

<option value=""></option>

${state.data.agents.map(a=>
`<option ${cell.r2===a?'selected':''}>${a}</option>`
).join('')}

</select>

</td>

<td class="border p-1">

<select onchange="updatePlan('${t.nom}',${dayIdx},'vidage',this.value)" class="text-xs w-full">

<option value=""></option>
<option ${cell.vidage==='Dépôt'?'selected':''}>Dépôt</option>
<option ${cell.vidage==='DRIMM'?'selected':''}>DRIMM</option>

</select>

</td>

<td class="border p-1">

<input type="text"
value="${cell.info||''}"
onchange="updatePlan('${t.nom}',${dayIdx},'info',this.value)"
class="text-xs w-full border rounded p-1">

</td>

<td class="border p-1">

<input type="text"
value="${cell.autres||''}"
onchange="updatePlan('${t.nom}',${dayIdx},'autres',this.value)"
class="text-xs w-full border rounded p-1">

</td>

<td class="border p-2 text-[10px] text-slate-500">

${dispo}

</td>

</tr>

`

})

})

document.getElementById("plan-body").innerHTML=html

}

function updatePlan(tName,day,field,val){

const key=`${state.annee}_W${state.semaine}`

if(!state.data.planning[key])
state.data.planning[key]={}

if(!state.data.planning[key][tName])
state.data.planning[key][tName]={}

if(!state.data.planning[key][tName][day])
state.data.planning[key][tName][day]={}

state.data.planning[key][tName][day][field]=val

sync()

}

function renderAll(){

document.getElementById('week-num').innerText=state.semaine

document.getElementById('pair-type').innerText=
(state.semaine%2===0)?"PAIRE":"IMPAIRE"

renderPlanning()

}

function showTab(id){

document.querySelectorAll('.tab-content')
.forEach(t=>t.classList.remove('active'))

document.getElementById(id).classList.add('active')

renderAll()

}

window.onload=load

</script>

<header class="bg-blue-900 text-white p-4 shadow-lg sticky top-0 z-50">

<div class="max-w-7xl mx-auto flex justify-between items-center">

<h1 class="font-black text-lg tracking-tighter">
GRAND SUD COLLECTE
</h1>

<nav class="flex gap-4 text-xs font-bold uppercase">

<button onclick="showTab('tab-plan')">Planning</button>
<button onclick="showTab('tab-params')">Paramètres</button>
<button onclick="showTab('tab-conges')">Congés</button>

</nav>

<div id="status" class="text-[9px] opacity-50 font-mono">
Connexion...
</div>

</div>

</header>

<main class="max-w-7xl mx-auto p-4">

<section id="tab-plan" class="tab-content active">

<div class="flex items-center gap-4 mb-4 bg-white p-3 rounded-lg shadow-sm border">

<button onclick="state.semaine--;renderAll()" class="p-2 bg-slate-100 rounded">
◀
</button>

<div class="text-center">

<div class="text-[10px] text-slate-400 font-bold uppercase">
Semaine <span id="pair-type"></span>
</div>

<div class="text-xl font-black text-blue-900">
S <span id="week-num">1</span>
</div>

</div>

<button onclick="state.semaine++;renderAll()" class="p-2 bg-slate-100 rounded">
▶
</button>

<input type="number"
value="2026"
onchange="state.annee=parseInt(this.value);renderAll()"
class="ml-auto border rounded p-1 w-20">

</div>

<h2 id="plan-title"
class="text-lg font-bold mb-3 text-blue-900">
</h2>

<div class="overflow-x-auto rounded-xl border shadow-xl bg-white">

<table class="w-full text-left">

<thead class="bg-slate-50 text-slate-500 text-[10px] uppercase">

<tr id="plan-header"></tr>

</thead>

<tbody id="plan-body"></tbody>

</table>

</div>

</section>

<section id="tab-params" class="tab-content">
<div class="bg-white p-10 rounded-xl shadow text-center text-slate-400">
Module paramètres inchangé
</div>
</section>

<section id="tab-conges" class="tab-content">
<div class="bg-white p-10 rounded-xl shadow text-center text-slate-400">
Module congés à venir
</div>
</section>

</main>

</body>
</html>

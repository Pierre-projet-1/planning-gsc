<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GSC Logistique</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<script src="https://unpkg.com/lucide-react@latest/dist/umd/lucide-react.min.js"></script>

<style>
.bg-om{background:#e2e8f0;color:#334155}
.bg-cs{background:#fef08a;color:#713f12}
.absent{background:#ef4444;color:white;font-weight:bold}
</style>

</head>

<body class="bg-slate-100">

<div id="root"></div>

<script type="text/babel">

const {
Calendar,
Users,
Settings,
Plus,
Minus,
Trash2,
ChevronLeft,
ChevronRight,
Truck,
Copy,
ClipboardCheck
} = LucideReact

function App(){

const BIN_ID="69b528beaa77b81da9e33a14"
const API_KEY="$2a$10$KM0Bk26gr5ZNVIpvSKTSIOs57V3dBxtizW1IjdbER1L/yjh24vaEq"
const URL=`https://api.jsonbin.io/v3/b/${BIN_ID}`

const [data,setData]=React.useState(null)
const [tab,setTab]=React.useState("planning")
const [week,setWeek]=React.useState(36)
const [year,setYear]=React.useState(2025)
const [clipboard,setClipboard]=React.useState(null)

React.useEffect(()=>{

fetch(URL+"/latest",{headers:{"X-Master-Key":API_KEY}})
.then(r=>r.json())
.then(j=>{

if(j && j.record){
setData(j.record)
}

})

},[])

function save(newData){

setData(newData)

fetch(URL,{
method:"PUT",
headers:{
"Content-Type":"application/json",
"X-Master-Key":API_KEY
},
body:JSON.stringify(newData)
})

}

if(!data) return <div className="p-10 text-center">Chargement...</div>

function dateKey(d){
return d.toISOString().split("T")[0]
}

function getWeekDays(){

let d=new Date(year,0,1+(week-1)*7)
let day=d.getDay()
let diff=d.getDate()-day+(day===0?-6:1)

let monday=new Date(d.setDate(diff))

let days=[]
for(let i=0;i<5;i++){
let n=new Date(monday)
n.setDate(monday.getDate()+i)
days.push(n)
}

return days
}

const days=getWeekDays()

const predispo = week%2===0
?data.predispositions.paires
:data.predispositions.impaires

function getAvailable(date){

const key=dateKey(date)

let abs=data.conges[key]||[]

let occ=[]

let wKey=`${year}-W${week}`

let weekPlan=data.planning[wKey]||{}

Object.values(weekPlan).forEach(t=>{

let d=t[key]||{}

if(d.ch) occ.push(d.ch)
if(d.r1) occ.push(d.r1)
if(d.r2) occ.push(d.r2)

})

return data.agents.filter(a=>!abs.includes(a)&&!occ.includes(a))

}

function updateCell(tournee,date,field,value){

let wKey=`${year}-W${week}`
let k=dateKey(date)

let n={...data}

if(!n.planning[wKey]) n.planning[wKey]={}
if(!n.planning[wKey][tournee]) n.planning[wKey][tournee]={}
if(!n.planning[wKey][tournee][k]) n.planning[wKey][tournee][k]={}

n.planning[wKey][tournee][k][field]=value

save(n)

}

function isAbsent(name,date){

let k=dateKey(date)

return (data.conges[k]||[]).includes(name)

}

return(

<div>

<header className="bg-slate-900 text-white p-4 flex justify-between">

<div className="flex items-center gap-2">
<Truck/>
<b>GSC Logistique</b>
</div>

<div className="flex gap-2">

<button onClick={()=>setTab("planning")}>Planning</button>
<button onClick={()=>setTab("conges")}>Congés</button>
<button onClick={()=>setTab("config")}>Paramètres</button>

</div>

</header>


<div className="p-6 max-w-7xl mx-auto">

{tab==="planning" &&(

<div>

<div className="flex gap-4 mb-4 items-center">

<button onClick={()=>setWeek(w=>w-1)}><ChevronLeft/></button>

<b>Semaine {week} - {year}</b>

<button onClick={()=>setWeek(w=>w+1)}><ChevronRight/></button>

<button onClick={()=>{
setClipboard(data.planning[`${year}-W${week}`])
alert("Copié")
}}>
<Copy/>
</button>

<button onClick={()=>{
if(!clipboard) return

let n={...data}

n.planning[`${year}-W${week}`]=JSON.parse(JSON.stringify(clipboard))

save(n)

}}>
<ClipboardCheck/>
</button>

</div>


<table className="w-full text-xs bg-white">

<thead>

<tr className="border-b">

<th>Jour</th>
<th>Tournée</th>
<th>Flux</th>
<th>Camion</th>
<th>Chauffeur</th>
<th>R1</th>
<th>R2</th>
<th>Vidage</th>
<th>Infos</th>
<th>Autres</th>
<th>Personnel dispo</th>

</tr>

</thead>

<tbody>

{days.map(day=>{

let dispo=getAvailable(day)

return predispo.map((t,i)=>{

let cell=data.planning?.[`${year}-W${week}`]?.[i]?.[dateKey(day)]||{}

return(

<tr key={i+dateKey(day)} className="border-b">

<td>{day.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"short"})}</td>

<td>{t.nom}</td>

<td className={t.flux==="CS"?"bg-cs":"bg-om"}>{t.flux}</td>

<td>

<select
value={cell.camion||""}
onChange={e=>updateCell(i,day,"camion",e.target.value)}
>

<option></option>

{data.camions.map(c=>
<option key={c}>{c}</option>
)}

</select>

</td>

<td className={isAbsent(cell.ch,day)?"absent":""}>

<select
value={cell.ch||""}
onChange={e=>updateCell(i,day,"ch",e.target.value)}
>

<option></option>

{data.agents.map(a=>
<option key={a}>{a}</option>
)}

</select>

</td>

<td className={isAbsent(cell.r1,day)?"absent":""}>

<select
value={cell.r1||""}
onChange={e=>updateCell(i,day,"r1",e.target.value)}
>

<option></option>

{data.agents.map(a=>
<option key={a}>{a}</option>
)}

</select>

</td>

<td className={isAbsent(cell.r2,day)?"absent":""}>

<select
value={cell.r2||""}
onChange={e=>updateCell(i,day,"r2",e.target.value)}
>

<option></option>

{data.agents.map(a=>
<option key={a}>{a}</option>
)}

</select>

</td>

<td>

<select
value={cell.vidage||""}
onChange={e=>updateCell(i,day,"vidage",e.target.value)}
>

<option></option>
<option>Dépôt</option>
<option>DRIMM</option>

</select>

</td>

<td>

<input
value={cell.info||""}
onChange={e=>updateCell(i,day,"info",e.target.value)}
/>

</td>

<td>

<input
value={cell.autres||""}
onChange={e=>updateCell(i,day,"autres",e.target.value)}
/>

</td>

<td>

{dispo.join(", ")}

</td>

</tr>

)

})

})}

</tbody>

</table>

</div>

)}

{tab==="config" &&(

<div className="grid grid-cols-2 gap-8">

<ListManager
title="Agents"
items={data.agents}
onSave={(l)=>save({...data,agents:l})}
/>

<ListManager
title="Camions"
items={data.camions}
onSave={(l)=>save({...data,camions:l})}
/>

</div>

)}

{tab==="conges" &&(

<div>

<h2>Gestion congés</h2>

<p>Cliquer sur un jour pour ajouter ou retirer un agent absent.</p>

</div>

)}

</div>

</div>

)

}


function ListManager({title,items,onSave}){

const [val,setVal]=React.useState("")

return(

<div className="bg-white p-4 rounded">

<h3 className="mb-4">{title}</h3>

<div className="flex gap-2 mb-4">

<input
value={val}
onChange={e=>setVal(e.target.value)}
className="border p-1"
/>

<button onClick={()=>{
if(!val) return
onSave([...items,val])
setVal("")
}}>

<Plus/>

</button>

</div>

{items.map((i,idx)=>(

<div key={idx} className="flex justify-between">

{i}

<button onClick={()=>onSave(items.filter((_,x)=>x!==idx))}>
<Minus/>
</button>

</div>

))}

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GSC Planning</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

.tab-content{display:none}
.tab-content.active{display:block}

.flux-om{background:#e2e8f0;color:#475569}
.flux-cs{background:#fef08a;color:#854d0e}

.en-conge{
background:#fca5a5!important;
color:#7f1d1d!important;
font-weight:bold
}

.case-conge{
background:#fecaca
}

</style>

</head>

<body class="bg-slate-100 min-h-screen">

<script>

const BIN_ID="69b528beaa77b81da9e33a14"
const API_KEY="$2a$10$KM0Bk26gr5ZNVIpvSKTSIOs57V3dBxtizW1IjdbER1L/yjh24vaEq"

const URL=`https://api.jsonbin.io/v3/b/${BIN_ID}`

let state={
annee:new Date().getFullYear(),
semaine:1,
mois:new Date().getMonth(),
data:{
agents:[],
camions:[],
tournees:[],
planning:{},
conges:{}
}
}

async function load(){

const res=await fetch(URL+"/latest",{headers:{"X-Master-Key":API_KEY}})
const json=await res.json()

state.data=json.record

renderAll()

}

async function sync(){

document.getElementById("status").innerText="⏳ Sauvegarde..."

await fetch(URL,{
method:"PUT",
headers:{
"Content-Type":"application/json",
"X-Master-Key":API_KEY
},
body:JSON.stringify(state.data)
})

document.getElementById("status").innerText="✅ Synchronisé"

}

function getWeekDates(w,y){

let simple=new Date(y,0,1+(w-1)*7)
let dow=simple.getDay()

let start=simple

if(dow<=4) start.setDate(simple.getDate()-simple.getDay()+1)
else start.setDate(simple.getDate()+8-simple.getDay())

let days=[]

for(let i=0;i<5;i++){

let d=new Date(start)
d.setDate(d.getDate()+i)

days.push(d)

}

return days

}

function renderPlanning(){

const dates=getWeekDates(state.semaine,state.annee)

const weekKey=`${state.annee}_W${state.semaine}`

const isPaire=state.semaine%2===0

const header=document.getElementById("plan-header")

header.innerHTML="<th class='p-2 border'>Tournée</th>"+dates.map(d=>`
<th class="p-2 border text-xs text-center">
${d.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"short"})}
</th>`).join("")

const tournees=state.data.tournees.filter(t=>
t.type==="fixe"||(isPaire&&t.type==="paire")||(!isPaire&&t.type==="impaire")
)

const body=document.getElementById("plan-body")

body.innerHTML=tournees.map(t=>{

return `<tr>

<td class="border p-2 font-bold bg-white">

${t.nom}

<div class="text-[10px] px-2 py-0.5 rounded mt-1 inline-block ${t.flux==="OM"?"flux-om":"flux-cs"}">

${t.flux}

</div>

</td>

${dates.map((d,day)=>{

const cell=state.data.planning?.[weekKey]?.[t.nom]?.[day]||{}

const conges=state.data.conges?.[d.toISOString().split("T")[0]]||[]

const check=(n)=>conges.includes(n)?"en-conge":""

const dispo=state.data.agents.filter(a=>
!conges.includes(a)&&
a!==cell.ch&&
a!==cell.r1&&
a!==cell.r2
)

return `

<td class="border p-1 bg-white text-[10px] min-w-[140px]">

<select onchange="update('${t.nom}',${day},'camion',this.value)" class="w-full mb-1">

<option value="">Camion</option>

${state.data.camions.map(c=>`<option ${cell.camion===c?"selected":""}>${c}</option>`).join("")}

</select>

<select onchange="update('${t.nom}',${day},'ch',this.value)" class="w-full mb-1 ${check(cell.ch)}">

<option>Chauffeur</option>

${state.data.agents.map(a=>`<option ${cell.ch===a?"selected":""}>${a}</option>`).join("")}

</select>

<select onchange="update('${t.nom}',${day},'r1',this.value)" class="w-full mb-1 ${check(cell.r1)}">

<option>Ripeur 1</option>

${state.data.agents.map(a=>`<option ${cell.r1===a?"selected":""}>${a}</option>`).join("")}

</select>

<select onchange="update('${t.nom}',${day},'r2',this.value)" class="w-full mb-1 ${check(cell.r2)}">

<option>Ripeur 2</option>

${state.data.agents.map(a=>`<option ${cell.r2===a?"selected":""}>${a}</option>`).join("")}

</select>

<select onchange="update('${t.nom}',${day},'vidage',this.value)" class="w-full mb-1">

<option>Vidage</option>
<option ${cell.vidage==="Dépôt"?"selected":""}>Dépôt</option>
<option ${cell.vidage==="DRIMM"?"selected":""}>DRIMM</option>

</select>

<input type="text" placeholder="Infos" value="${cell.info||""}" onchange="update('${t.nom}',${day},'info',this.value)" class="w-full mb-1 bg-slate-50">

<input type="text" placeholder="Autres" value="${cell.autres||""}" onchange="update('${t.nom}',${day},'autres',this.value)" class="w-full bg-slate-50">

<div class="text-[9px] text-slate-400 mt-1">

Dispo : ${dispo.join(", ")}

</div>

</td>

`

}).join("")}

</tr>`

}).join("")

}

function update(tournee,day,field,val){

const key=`${state.annee}_W${state.semaine}`

if(!state.data.planning[key]) state.data.planning[key]={}

if(!state.data.planning[key][tournee]) state.data.planning[key][tournee]={}

if(!state.data.planning[key][tournee][day]) state.data.planning[key][tournee][day]={}

state.data.planning[key][tournee][day][field]=val

sync()

renderPlanning()

}

function renderConges(){

const container=document.getElementById("conges")

const days=new Date(state.annee,state.mois+1,0).getDate()

let header="<tr><th class='border p-1'>Agent</th>"

for(let d=1;d<=days;d++) header+=`<th class='border text-[10px]'>${d}</th>`

header+="</tr>"

let body=""

state.data.agents.forEach(agent=>{

body+="<tr>"

body+=`<td class='border p-1 font-bold'>${agent}</td>`

for(let d=1;d<=days;d++){

const date=`${state.annee}-${String(state.mois+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`

const list=state.data.conges[date]||[]

const active=list.includes(agent)

body+=`

<td onclick="toggleConge('${agent}','${date}')" 
class="border text-center cursor-pointer ${active?"case-conge":""}">
</td>

`

}

body+="</tr>"

})

container.innerHTML=`<table class="border-collapse text-xs">${header}${body}</table>`

}

function toggleConge(agent,date){

if(!state.data.conges[date]) state.data.conges[date]=[]

const arr=state.data.conges[date]

if(arr.includes(agent))
state.data.conges[date]=arr.filter(a=>a!==agent)
else
arr.push(agent)

sync()

renderConges()
renderPlanning()

}

function renderParams(){

["agents","camions","tournees"].forEach(type=>{

const list=document.getElementById("list-"+type)

list.innerHTML=state.data[type].map((it,i)=>`

<li class="flex justify-between p-1 bg-white border mb-1">

${typeof it==="string"?it:it.nom+" ("+it.type+")"}

<button onclick="removeParam('${type}',${i})">✕</button>

</li>

`).join("")

})

}

function addParam(type){

const val=document.getElementById("in-"+type).value

if(!val) return

if(type==="tournees"){

const flux=document.getElementById("in-flux").value
const freq=document.getElementById("in-freq").value

state.data.tournees.push({nom:val,flux:flux,type:freq})

}else{

state.data[type].push(val)

}

sync()
renderAll()

}

function removeParam(type,i){

state.data[type].splice(i,1)

sync()
renderAll()

}

function renderAll(){

renderPlanning()
renderParams()
renderConges()

}

function showTab(id){

document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

window.onload=load

</script>

<header class="bg-blue-900 text-white p-4 flex justify-between">

<b>GRAND SUD COLLECTE</b>

<div id="status">Connexion...</div>

<nav class="flex gap-4">

<button onclick="showTab('plan')">Planning</button>
<button onclick="showTab('conges-tab')">Congés</button>
<button onclick="showTab('params')">Paramètres</button>

</nav>

</header>

<main class="p-6">

<section id="plan" class="tab-content active">

<div class="mb-4">

<button onclick="state.semaine--;renderPlanning()">◀</button>

Semaine <span id="week">${state.semaine}</span>

<button onclick="state.semaine++;renderPlanning()">▶</button>

</div>

<table class="border-collapse w-full">

<thead id="plan-header"></thead>
<tbody id="plan-body"></tbody>

</table>

</section>

<section id="conges-tab" class="tab-content">

<div class="flex gap-4 mb-4">

<select onchange="state.mois=this.value;renderConges()">

${["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"]
.map((m,i)=>`<option value="${i}">${m}</option>`).join("")}

</select>

<input type="number" value="2026" onchange="state.annee=this.value;renderConges()">

</div>

<div id="conges"></div>

</section>

<section id="params" class="tab-content">

Agents
<input id="in-agents">
<button onclick="addParam('agents')">+</button>
<ul id="list-agents"></ul>

Camions
<input id="in-camions">
<button onclick="addParam('camions')">+</button>
<ul id="list-camions"></ul>

Tournées
<input id="in-tournees">

<select id="in-flux">
<option value="OM">OM</option>
<option value="CS">CS</option>
</select>

<select id="in-freq">
<option value="fixe">Fixe</option>
<option value="paire">Paire</option>
<option value="impaire">Impaire</option>
</select>

<button onclick="addParam('tournees')">+</button>

<ul id="list-tournees"></ul>

</section>

</main>

</body>
</html>

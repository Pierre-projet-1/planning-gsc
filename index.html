<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSC - Planning Professionnel Privé</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
.tab-content{display:none}
.tab-content.active{display:block}
.flux-om{background-color:#e2e8f0;color:#475569;border-left:4px solid #475569}
.flux-cs{background-color:#fef08a;color:#854d0e;border-left:4px solid #854d0e}
.is-conge{background-color:#ef4444!important;color:white!important;font-weight:800;border:2px solid #b91c1c!important}
.is-double{background-color:#ffedd5!important;color:#9a3412;font-weight:bold;border:2px solid #f97316!important}
th{font-size:10px;text-transform:uppercase;letter-spacing:.05em;padding:12px 8px}
td{font-size:11px;padding:6px;border:1px solid #e2e8f0}
.cell-conge-active{background-color:#ef4444!important;border-color:#b91c1c!important}
.weekend-bg{background-color:#f1f5f9!important;color:#94a3b8}
#login-overlay{position:fixed;inset:0;z-index:100;background:#0f172a;display:flex;align-items:center;justify-content:center}
.admin-only{display:none}
body.is-admin .admin-only{display:block}
</style>
</head>

<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

<div id="login-overlay">
<div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
<div class="text-center mb-8">
<h2 class="text-3xl font-black text-slate-900 uppercase tracking-tighter">Grand Sud Collecte</h2>
<p class="text-slate-400 text-sm font-bold uppercase tracking-widest">Espace Privé</p>
</div>

<div class="space-y-4">
<input type="email" id="login-email" placeholder="Email" class="w-full border-2 p-3 rounded-xl outline-none focus:border-blue-500">
<input type="password" id="login-pass" placeholder="Mot de passe" class="w-full border-2 p-3 rounded-xl outline-none focus:border-blue-500">
<button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-black p-4 rounded-xl shadow-xl hover:bg-blue-700 uppercase text-sm">Connexion</button>
<p id="login-error" class="text-red-500 text-xs font-bold text-center hidden">Identifiants incorrects.</p>
</div>
</div>
</div>

<script>

const BIN_ID="69b528beaa77b81da9e33a14"
const API_KEY="$2a$10$KM0Bk26gr5ZNVIpvSKTSIOs57V3dBxtizW1IjdbER1L/yjh24vaEq"
const URL=`https://api.jsonbin.io/v3/b/${BIN_ID}`

let currentUser=null

let state={
annee:2026,
semaine:1,
moisConges:new Date().getMonth(),
anneeConges:2026,
data:{agents:[],camions:[],tournees:[],planning:{},conges:{},users:[]}
}

const JOURS_NOM=["Lundi","Mardi","Mercredi","Jeudi","Vendredi"]


/* =========================
CORRECTION FORMAT DATE
========================= */

function toLocalISO(date){
const offset=date.getTimezoneOffset()*60000
return new Date(date.getTime()-offset).toISOString().split('T')[0]
}


/* =========================
LOAD
========================= */

async function load(){

try{

const res=await fetch(`${URL}/latest`,{headers:{"X-Master-Key":API_KEY}})
const json=await res.json()

if(json.record) state.data=json.record

document.getElementById('status').innerText="✅ Connecté"

initWeekSelector()
renderAll()

}catch(err){

document.getElementById('status').innerText="❌ Erreur"

}

}

async function sync(){

if(currentUser.role!=='admin') return

document.getElementById('status').innerText="⏳ Sauvegarde..."

await fetch(URL,{
method:'PUT',
headers:{
"Content-Type":"application/json",
"X-Master-Key":API_KEY
},
body:JSON.stringify(state.data)
})

document.getElementById('status').innerText="✅ Sauvegardé"

}


/* =========================
LOGIN
========================= */

function handleLogin(){

const email=document.getElementById('login-email').value
const pass=document.getElementById('login-pass').value

if(state.data.users.length===0 && email==='admin@gsc.fr' && pass==='admin123'){

currentUser={email,prenom:'Admin',nom:'GSC',role:'admin',pass:'admin123'}
state.data.users.push(currentUser)

}else{

currentUser=state.data.users.find(u=>u.email===email && u.pass===pass)

}

if(currentUser){

document.getElementById('login-overlay').style.display='none'

document.getElementById('user-display-name').innerText=
`${currentUser.prenom} ${currentUser.nom}`

if(currentUser.role==='admin')
document.body.classList.add('is-admin')

renderAll()

}else{

document.getElementById('login-error').classList.remove('hidden')

}

}


/* =========================
SEMAINES
========================= */

function initWeekSelector(){

const select=document.getElementById('week-selector')
select.innerHTML=""

for(let i=1;i<=52;i++){

let opt=document.createElement('option')
opt.value=i
opt.innerText=`Semaine ${i}`

if(i===state.semaine) opt.selected=true

select.appendChild(opt)

}

}


/* =========================
DATES SEMAINE
========================= */

function getDatesOfWeek(w,y){

let simple=new Date(y,0,1+(w-1)*7)
let dow=simple.getDay()

let ISOweekStart=simple

if(dow<=4)
ISOweekStart.setDate(simple.getDate()-simple.getDay()+1)
else
ISOweekStart.setDate(simple.getDate()+8-simple.getDay())

let days=[]

for(let i=0;i<5;i++){

let d=new Date(ISOweekStart)
d.setDate(d.getDate()+i)

days.push({
texte:d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'}),
iso:toLocalISO(d)
})

}

return days

}


/* =========================
PLANNING
========================= */

function renderPlanning(){

const isPaire=state.semaine%2===0
const weekKey=`${state.annee}_W${state.semaine}`

const dates=getDatesOfWeek(state.semaine,state.annee)

const centralDate=new Date(dates[0].iso)

document.getElementById('header-semaine').innerText=state.semaine

document.getElementById('header-mois-annee').innerText=
centralDate.toLocaleString('fr-FR',{month:'long',year:'numeric'})

document.getElementById('header-flux-type').innerText=isPaire?"PAIRE":"IMPAIRE"

const body=document.getElementById('plan-body')
body.innerHTML=""

const isLocked=currentUser.role!=='admin'

dates.forEach((dateObj,dayIdx)=>{

const tourDuJour=
state.data.tournees.filter(t=>t.type===(isPaire?'paire':'impaire') && t.jour==(dayIdx+1))

let counts={}

tourDuJour.forEach(t=>{

const c=state.data.planning[weekKey]?.[`${t.nom}_${dayIdx}`]||{}

;[c.ch,c.r1,c.r2].forEach(n=>{
if(n) counts[n]=(counts[n]||0)+1
})

})

tourDuJour.forEach(t=>{

const rowKey=`${t.nom}_${dayIdx}`
const cell=state.data.planning[weekKey]?.[rowKey]||{}

const checkClass=(n)=>{

if(!n) return ""

const congesAgent=state.data.conges[n]||[]

if(congesAgent.includes(dateObj.iso)) return 'is-conge'

if(counts[n]>1) return 'is-double'

return ""

}

const tr=document.createElement('tr')
tr.className="bg-white"

tr.innerHTML=`
<td class="font-bold text-slate-600 bg-slate-50/50">${dateObj.texte}</td>
<td class="font-black text-blue-900 uppercase">${t.nom}</td>

<td class="text-center">
<span class="px-2 py-1 rounded text-[9px] font-bold ${t.flux==='OM'?'flux-om':'flux-cs'}">
${t.flux}
</span>
</td>

<td>
<select ${isLocked?'disabled':''}
onchange="updatePlan('${rowKey}','camion',this.value)"
class="w-full p-1 border rounded">
<option value="">-</option>
${state.data.camions.map(c=>`<option ${cell.camion===c?'selected':''}>${c}</option>`).join('')}
</select>
</td>

<td>
<select ${isLocked?'disabled':''}
onchange="updatePlan('${rowKey}','ch',this.value)"
class="w-full p-1 border rounded ${checkClass(cell.ch)}">
<option value="">-</option>
${state.data.agents.filter(a => !(state.data.conges[a]||[]).includes(dateObj.iso) || cell.ch===a).map(a=>`<option ${cell.ch===a?'selected':''}>${a}</option>`).join('')}
</select>
</td>

<td>
<select ${isLocked?'disabled':''}
onchange="updatePlan('${rowKey}','r1',this.value)"
class="w-full p-1 border rounded ${checkClass(cell.r1)}">
<option value="">-</option>
${state.data.agents.filter(a => !(state.data.conges[a]||[]).includes(dateObj.iso) || cell.r1===a).map(a=>`<option ${cell.r1===a?'selected':''}>${a}</option>`).join('')}
</select>
</td>

<td>
<select ${isLocked?'disabled':''}
onchange="updatePlan('${rowKey}','r2',this.value)"
class="w-full p-1 border rounded ${checkClass(cell.r2)}">
<option value="">-</option>
${state.data.agents.filter(a => !(state.data.conges[a]||[]).includes(dateObj.iso) || cell.r2===a).map(a=>`<option ${cell.r2===a?'selected':''}>${a}</option>`).join('')}
</select>
</td>

<td>
<select ${isLocked?'disabled':''}
onchange="updatePlan('${rowKey}','vidage',this.value)"
class="w-full p-1 border rounded font-bold">
<option value="">-</option>
<option ${cell.vidage==='Dépôt'?'selected':''}>Dépôt</option>
<option ${cell.vidage==='DRIMM'?'selected':''}>DRIMM</option>
</select>
</td>

<td>
<input type="text" ${isLocked?'disabled':''}
value="${cell.info||''}"
onchange="updatePlan('${rowKey}','info',this.value)"
class="w-full p-1 border rounded">
</td>

<td>
<input type="text" ${isLocked?'disabled':''}
value="${cell.autres||''}"
onchange="updatePlan('${rowKey}','autres',this.value)"
class="w-full p-1 border rounded">
</td>

<td class="text-[9px] text-emerald-600 font-bold bg-emerald-50/30">
${state.data.agents.filter(a => !counts[a] && !(state.data.conges[a]||[]).includes(dateObj.iso)).join(', ')}
</td>
`

body.appendChild(tr)

})

})

}


/* =========================
UPDATE PLAN
========================= */

function updatePlan(rk,f,v){

const wk=`${state.annee}_W${state.semaine}`

if(!state.data.planning[wk])
state.data.planning[wk]={}

if(!state.data.planning[wk][rk])
state.data.planning[wk][rk]={}

state.data.planning[wk][rk][f]=v

sync()
renderPlanning()

}


/* =========================
CONGES
========================= */

function renderConges(){

const container=document.getElementById('conges-wrapper')

const joursDansMois=
new Date(state.anneeConges,state.moisConges+1,0).getDate()

const nomsMois=[
"Janvier","Février","Mars","Avril","Mai","Juin",
"Juillet","Août","Septembre","Octobre","Novembre","Décembre"
]

document.getElementById('current-month-display').innerText=
`${nomsMois[state.moisConges]} ${state.anneeConges}`

let html=`<table class="w-full border-collapse bg-white shadow-sm">
<thead>
<tr class="bg-slate-800 text-white">
<th>Agent</th>
`

for(let j=1;j<=joursDansMois;j++){

const dateTemp=new Date(state.anneeConges,state.moisConges,j)
const isWE=dateTemp.getDay()===0||dateTemp.getDay()===6

const jourLabel=
dateTemp.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric'})

html+=`<th class="text-[8px] border p-1 ${isWE?'bg-slate-600':''}">
${jourLabel}
</th>`

}

html+=`</tr></thead><tbody>`

state.data.agents.forEach(agent=>{

html+=`<tr>
<td class="font-bold border p-2 text-[10px] bg-slate-50 sticky left-0 z-10">
${agent}
</td>`

for(let j=1;j<=joursDansMois;j++){

const dateTemp=new Date(state.anneeConges,state.moisConges,j)
const isWE=dateTemp.getDay()===0||dateTemp.getDay()===6

const dIso=toLocalISO(new Date(state.anneeConges,state.moisConges,j))

const isC=(state.data.conges[agent]||[]).includes(dIso)

html+=`
<td ${currentUser.role==='admin' ? `onclick="toggleConge('${agent}','${dIso}')"`:''}
class="border cursor-pointer transition-colors
${isC?'cell-conge-active':''}
${isWE && !isC ? 'weekend-bg':''}">
</td>
`

}

html+=`</tr>`

})

container.innerHTML=html+`</tbody></table>`

}

function toggleConge(a,d){

if(!state.data.conges[a])
state.data.conges[a]=[]

const i=state.data.conges[a].indexOf(d)

if(i>-1)
state.data.conges[a].splice(i,1)
else
state.data.conges[a].push(d)

renderConges()
renderPlanning()
sync()

}


/* =========================
USERS / PARAMS / RENDER
(le reste du code est strictement identique)
========================= */

function renderUsers(){
document.getElementById('list-users').innerHTML=
state.data.users.map((u,i)=>`
<div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border mb-2">
<div>
<p class="font-black text-sm">${u.prenom} ${u.nom}</p>
<p class="text-[10px] text-slate-400 font-bold uppercase">${u.email}</p>
</div>
<div class="flex gap-2">
<select onchange="updateUserRole(${i}, this.value)" class="text-[10px] font-bold border rounded p-1">
<option value="read" ${u.role==='read'?'selected':''}>Lecteur</option>
<option value="admin" ${u.role==='admin'?'selected':''}>Admin</option>
</select>
<button onclick="removeUser(${i})" class="text-red-500 font-bold text-xs">✕</button>
</div>
</div>`).join('')
}

function updateUserRole(i,r){state.data.users[i].role=r;sync();alert("Rôle mis à jour !")}
function removeUser(i){if(state.data.users[i].email===currentUser.email)return;state.data.users.splice(i,1);renderUsers();sync()}
function addUser(){
state.data.users.push({
prenom:document.getElementById('new-u-prenom').value,
nom:document.getElementById('new-u-nom').value,
email:document.getElementById('new-u-email').value,
pass:document.getElementById('new-u-pass').value,
role:document.getElementById('new-u-role').value
})
renderUsers();sync()
}

function addParam(t){
if(t==='tournees')
state.data.tournees.push({
nom:document.getElementById('in-tournees').value,
flux:document.getElementById('in-flux').value,
type:document.getElementById('in-freq').value,
jour:document.getElementById('in-jour').value
})
else
state.data[t].push(document.getElementById(`in-${t}`).value)

renderAll();sync()
}

function renderAll(){

if(!currentUser) return

renderPlanning()
renderConges()
renderUsers()

;['agents','camions'].forEach(t=>{

document.getElementById(`list-${t}`).innerHTML=
state.data[t].map((item,i)=>`
<li class="flex justify-between text-xs p-2 bg-slate-50 mb-1 rounded border">
${item}
<button onclick="state.data['${t}'].splice(${i},1);renderAll();sync();" class="text-red-500 admin-only">✕</button>
</li>`).join('')

})

const lT=(type)=>state.data.tournees.map((t,i)=>
(t.type===type)?
`<div class="flex justify-between p-2 mb-1 bg-white border text-[11px] rounded shadow-sm">
<span><b>${JOURS_NOM[t.jour-1]}</b> : ${t.nom}</span>
<button onclick="state.data.tournees.splice(${i},1);renderAll();sync();" class="text-red-400 admin-only">✕</button>
</div>`:'').join('')

document.getElementById('list-tournees-impaires').innerHTML=lT('impaire')
document.getElementById('list-tournees-paires').innerHTML=lT('paire')

}

function changeMoisConges(delta){
state.moisConges+=delta
if(state.moisConges>11){state.moisConges=0;state.anneeConges++}
if(state.moisConges<0){state.moisConges=11;state.anneeConges--}
renderConges()
}

function showTab(id){
document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'))
document.getElementById(id).classList.add('active')
renderAll()
}

window.onload=load

</script>

</body>
</html>

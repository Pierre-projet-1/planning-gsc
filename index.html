<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSC Planning - Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        // Import des icônes Lucide
        const { 
            Calendar, Users, Settings, Plus, Trash2, 
            ChevronLeft, ChevronRight, Clock, 
            Truck, AlertCircle, Info, Filter 
        } = lucide;

        const App = () => {
            // --- CONFIGURATION JSONBIN ---
            const BIN_ID = "69b528beaa77b81da9e33a14";
            const API_KEY = "$2a$10$KM0Bk26gr5ZNVIpvSKTSIOs57V3dBxtizW1IjdbER1L/yjh24vaEq";
            const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

            const [activeTab, setActiveTab] = useState('planning');
            const [currentWeek, setCurrentWeek] = useState(() => {
                const now = new Date();
                const onejan = new Date(now.getFullYear(), 0, 1);
                return Math.ceil((((now.getTime() - onejan.getTime()) / 86400000) + onejan.getDay() + 1) / 7);
            });
            const [currentYear, setCurrentYear] = useState(2026);
            const [data, setData] = useState({ agents: [], camions: [], tournees: [], planning: {}, conges: {} });
            const [loading, setLoading] = useState(true);
            const [syncing, setSyncing] = useState(false);

            useEffect(() => {
                const loadData = async () => {
                    try {
                        const res = await fetch(`${URL}/latest`, { headers: { "X-Master-Key": API_KEY } });
                        const json = await res.json();
                        setData(json.record);
                        setLoading(false);
                    } catch (e) { console.error("Erreur chargement", e); }
                };
                loadData();
            }, []);

            const pushData = async (newData) => {
                setSyncing(true);
                try {
                    await fetch(URL, {
                        method: 'PUT',
                        headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                        body: JSON.stringify(newData)
                    });
                    setSyncing(false);
                } catch (e) { setSyncing(false); }
            };

            const getDates = (w, y) => {
                let simple = new Date(y, 0, 1 + (w - 1) * 7);
                let ISOweekStart = simple;
                let dow = simple.getDay();
                if (dow <= 4) ISOweekStart.setDate(simple.getDate() - simple.getDay() + 1);
                else ISOweekStart.setDate(simple.getDate() + 8 - simple.getDay());
                let daysArr = [];
                for (let i = 0; i < 5; i++) {
                    let d = new Date(ISOweekStart);
                    d.setDate(d.getDate() + i);
                    daysArr.push({ 
                        name: ['Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi'][i], 
                        formatted: d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' }),
                        monthIdx: d.getMonth()
                    });
                }
                return daysArr;
            };

            const currentDays = getDates(currentWeek, currentYear);
            const isWeekEven = currentWeek % 2 === 0;

            const updatePlanning = (tourneeNom, dayName, field, value) => {
                const weekKey = `${currentYear}_W${currentWeek}`;
                const newData = { ...data };
                if (!newData.planning[weekKey]) newData.planning[weekKey] = {};
                if (!newData.planning[weekKey][tourneeNom]) newData.planning[weekKey][tourneeNom] = {};
                if (!newData.planning[weekKey][tourneeNom][dayName]) newData.planning[weekKey][tourneeNom][dayName] = {};
                newData.planning[weekKey][tourneeNom][dayName][field] = value;
                setData(newData);
                pushData(newData);
            };

            const toggleConge = (name, monthIdx) => {
                const newData = { ...data };
                if (!newData.conges[monthIdx]) newData.conges[monthIdx] = [];
                if (newData.conges[monthIdx].includes(name)) newData.conges[monthIdx] = newData.conges[monthIdx].filter(n => n !== name);
                else newData.conges[monthIdx].push(name);
                setData(newData);
                pushData(newData);
            };

            if (loading) return <div className="flex h-screen items-center justify-center font-bold text-blue-600">Chargement du planning GSC...</div>;

            return (
                <div className="min-h-screen pb-10 text-slate-900">
                    <header className="bg-white border-b sticky top-0 z-30 shadow-sm px-6 h-16 flex items-center justify-between">
                        <div className="flex items-center space-x-3">
                            <Truck className="text-blue-600" />
                            <h1 className="text-lg font-black">GRAND SUD COLLECTE</h1>
                        </div>
                        <nav className="flex bg-slate-100 p-1 rounded-xl">
                            {['planning', 'conges', 'config'].map(tab => (
                                <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all ${activeTab === tab ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                                    {tab.toUpperCase()}
                                </button>
                            ))}
                        </nav>
                    </header>

                    <main className="max-w-[1400px] mx-auto p-6">
                        {activeTab === 'planning' && (
                            <div className="space-y-6">
                                <div className="flex items-center justify-between bg-white p-4 rounded-2xl border shadow-sm">
                                    <div className="flex items-center space-x-4">
                                        <button onClick={() => setCurrentWeek(w => Math.max(1, w - 1))} className="p-2 border rounded-full"><ChevronLeft/></button>
                                        <div className="text-center">
                                            <span className="text-[10px] font-bold text-blue-600 uppercase block">Semaine {currentWeek} ({isWeekEven ? 'Paire' : 'Impaire'})</span>
                                            <span className="text-xl font-black">2026</span>
                                        </div>
                                        <button onClick={() => setCurrentWeek(w => Math.min(52, w + 1))} className="p-2 border rounded-full"><ChevronRight/></button>
                                    </div>
                                    <div className="text-[10px] font-bold">{syncing ? "Enregistrement..." : "✅ Synchronisé"}</div>
                                </div>

                                <div className="bg-white rounded-2xl border shadow-sm overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead>
                                            <tr className="bg-slate-50 border-b">
                                                <th className="p-4 border-r w-48 text-[10px] font-bold text-slate-400">Tournée / Flux</th>
                                                {currentDays.map(d => (
                                                    <th key={d.name} className="p-4 border-r text-center">
                                                        <span className="block text-blue-600 font-bold text-xs">{d.name}</span>
                                                        <span className="text-[10px] text-slate-400">{d.formatted}</span>
                                                    </th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {data.tournees
                                              .filter(t => t.frequence === 'toutes' || (isWeekEven && t.frequence === 'paire') || (!isWeekEven && t.frequence === 'impaire'))
                                              .map(t => (
                                                <tr key={t.nom} className="border-b">
                                                    <td className={`p-4 border-r font-bold text-sm ${t.flux === 'CS' ? 'bg-yellow-50' : 'bg-slate-50'}`}>
                                                        {t.nom}
                                                        <span className="block text-[9px] text-slate-400 uppercase">{t.flux || 'OM'}</span>
                                                    </td>
                                                    {currentDays.map(d => {
                                                        const cell = data.planning[`${currentYear}_W${currentWeek}`]?.[t.nom]?.[d.name] || {};
                                                        const isC1Conge = data.conges[d.monthIdx]?.includes(cell.ch);
                                                        return (
                                                            <td key={d.name} className="p-2 border-r min-w-[150px]">
                                                                <div className="space-y-1">
                                                                    <select value={cell.ch || ''} onChange={(e) => updatePlanning(t.nom, d.name, 'ch', e.target.value)} className={`w-full text-[10px] p-1 border rounded ${isC1Conge ? 'bg-red-500 text-white' : ''}`}>
                                                                        <option value="">Conducteur</option>
                                                                        {data.agents.map(a => <option key={a}>{a}</option>)}
                                                                    </select>
                                                                    <div className="flex gap-1">
                                                                        <select value={cell.r1 || ''} onChange={(e) => updatePlanning(t.nom, d.name, 'r1', e.target.value)} className="w-1/2 text-[10px] p-1 border rounded">
                                                                            <option value="">R1</option>
                                                                            {data.agents.map(a => <option key={a}>{a}</option>)}
                                                                        </select>
                                                                        <select value={cell.r2 || ''} onChange={(e) => updatePlanning(t.nom, d.name, 'r2', e.target.value)} className="w-1/2 text-[10px] p-1 border rounded">
                                                                            <option value="">R2</option>
                                                                            {data.agents.map(a => <option key={a}>{a}</option>)}
                                                                        </select>
                                                                    </div>
                                                                    <select value={cell.camion || ''} onChange={(e) => updatePlanning(t.nom, d.name, 'camion', e.target.value)} className="w-full text-[10px] p-1 border rounded bg-slate-50">
                                                                        <option value="">Camion</option>
                                                                        {data.camions.map(v => <option key={v}>{v}</option>)}
                                                                    </select>
                                                                    <input type="text" placeholder="Vidage..." value={cell.info || ''} onChange={(e) => updatePlanning(t.nom, d.name, 'info', e.target.value)} className="w-full text-[9px] border-none text-center bg-transparent"/>
                                                                </div>
                                                            </td>
                                                        );
                                                    })}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'config' && (
                            <div className="grid md:grid-cols-3 gap-8">
                                <ConfigCard title="Agents" items={data.agents} onAdd={(v) => { const newData = {...data, agents: [...data.agents, v]}; setData(newData); pushData(newData); }} onDelete={(i) => { const newData = {...data, agents: data.agents.filter((_, idx) => idx !== i)}; setData(newData); pushData(newData); }} />
                                <ConfigCard title="Camions" items={data.camions} onAdd={(v) => { const newData = {...data, camions: [...data.camions, v]}; setData(newData); pushData(newData); }} onDelete={(i) => { const newData = {...data, camions: data.camions.filter((_, idx) => idx !== i)}; setData(newData); pushData(newData); }} />
                                <div className="bg-white p-6 rounded-2xl border shadow-sm">
                                    <h2 className="font-bold text-xs uppercase text-slate-400 mb-4">Tournées</h2>
                                    <input id="t-nom" type="text" placeholder="Nom..." className="w-full border rounded-xl px-4 py-2 text-sm mb-2"/>
                                    <div className="flex gap-2 mb-2">
                                        <select id="t-flux" className="flex-1 border rounded-lg p-2 text-xs"><option value="OM">OM</option><option value="CS">CS</option></select>
                                        <select id="t-freq" className="flex-1 border rounded-lg p-2 text-xs"><option value="toutes">Toutes</option><option value="paire">Paire</option><option value="impaire">Impaire</option></select>
                                    </div>
                                    <button onClick={() => {
                                        const n = document.getElementById('t-nom').value;
                                        if(n) {
                                            const newData = {...data, tournees: [...data.tournees, {nom: n, flux: document.getElementById('t-flux').value, frequence: document.getElementById('t-freq').value}]};
                                            setData(newData); pushData(newData); document.getElementById('t-nom').value = '';
                                        }
                                    }} className="w-full bg-blue-600 text-white rounded-xl py-2 font-bold text-sm">Ajouter</button>
                                    <div className="mt-4 space-y-2">
                                        {data.tournees.map((t, i) => (
                                            <div key={i} className="flex justify-between items-center p-2 bg-slate-50 rounded-lg text-xs">
                                                <span>{t.nom} ({t.frequence})</span>
                                                <button onClick={() => { const newData = {...data, tournees: data.tournees.filter((_, idx) => idx !== i)}; setData(newData); pushData(newData); }}><Trash2 className="w-4 h-4 text-red-400"/></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'conges' && (
                            <div className="bg-white p-8 rounded-2xl border shadow-sm">
                                <h2 className="text-xl font-black mb-6">Gestion des Congés 2026</h2>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    {['Jan','Fév','Mar','Avr','Mai','Jui','Jul','Aoû','Sep','Oct','Nov','Déc'].map((m, idx) => (
                                        <div key={m} className="bg-slate-50 p-4 rounded-xl border">
                                            <h3 className="font-bold text-xs mb-3 border-b">{m}</h3>
                                            <div className="flex flex-wrap gap-1">
                                                {data.agents.map(a => (
                                                    <button key={a} onClick={() => toggleConge(a, idx)} className={`px-2 py-1 rounded text-[9px] font-bold ${data.conges[idx]?.includes(a) ? 'bg-red-500 text-white' : 'bg-white border'}`}>{a}</button>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const ConfigCard = ({ title, items, onAdd, onDelete }) => {
            const [val, setVal] = useState('');
            return (
                <div className="bg-white p-6 rounded-2xl border shadow-sm">
                    <h2 className="font-bold text-xs uppercase text-slate-400 mb-4">{title}</h2>
                    <div className="flex gap-2 mb-4">
                        <input type="text" value={val} onChange={e => setVal(e.target.value)} className="flex-1 border rounded-xl px-4 py-2 text-sm" placeholder="Ajouter..."/>
                        <button onClick={() => { if(val) { onAdd(val); setVal(''); }}} className="bg-blue-600 text-white p-2 rounded-xl"><Plus/></button>
                    </div>
                    <div className="space-y-2">
                        {items.map((item, i) => (
                            <div key={i} className="flex justify-between items-center p-2 bg-slate-50 rounded-lg text-xs">
                                <span>{item}</span>
                                <button onClick={() => onDelete(i)}><Trash2 className="w-4 h-4 text-red-300 hover:text-red-500"/></button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

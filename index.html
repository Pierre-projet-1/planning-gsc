<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSC - Planning Professionnel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .flux-om { background-color: #e2e8f0; color: #475569; } /* Gris */
        .flux-cs { background-color: #fef08a; color: #854d0e; } /* Jaune */
        .en-conge { background-color: #fca5a5 !important; color: #b91c1c !important; font-weight: bold; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

    <script>
        // --- CONFIGURATION JSONBIN ---
        const BIN_ID = "69b528beaa77b81da9e33a14"; 
        const API_KEY = "$2a$10$KM0Bk26gr5ZNVIpvSKTSIOs57V3dBxtizW1IjdbER1L/yjh24vaEq"; 
        const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        let state = {
            annee: new Date().getFullYear(),
            semaine: 1,
            moisConges: new Date().getMonth(),
            data: {
                agents: [],
                camions: [],
                tournees: [], // {nom, flux, type: 'paire'|'impaire'|'fixe'}
                planning: {}, // '2026_W1'
                conges: {}    // '2026_M8': [noms]
            }
        };

        // --- CHARGEMENT / SAUVEGARDE ---
        async function load() {
            const res = await fetch(`${URL}/latest`, { headers: { "X-Master-Key": API_KEY } });
            const json = await res.json();
            state.data = json.record;
            renderAll();
        }

        async function sync() {
            document.getElementById('status').innerText = "⏳ Sauvegarde...";
            await fetch(URL, {
                method: 'PUT',
                headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                body: JSON.stringify(state.data)
            });
            document.getElementById('status').innerText = "✅ Synchronisé";
        }

        // --- OUTILS DATES ---
        function getDatesOfWeek(w, y) {
            let simple = new Date(y, 0, 1 + (w - 1) * 7);
            let dow = simple.getDay();
            let ISOweekStart = simple;
            if (dow <= 4) ISOweekStart.setDate(simple.getDate() - simple.getDay() + 1);
            else ISOweekStart.setDate(simple.getDate() + 8 - simple.getDay());
            
            let days = [];
            for (let i = 0; i < 5; i++) {
                let d = new Date(ISOweekStart);
                d.setDate(d.getDate() + i);
                days.push(d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' }));
            }
            return days;
        }

        // --- RENDU PLANNING ---
        function renderPlanning() {
            const isPaire = state.semaine % 2 === 0;
            const weekKey = `${state.annee}_W${state.semaine}`;
            const congeKey = `${state.annee}_M${new Date(state.annee, 0, 1 + (state.semaine - 1) * 7).getMonth()}`;
            const agentsEnConges = state.data.conges[congeKey] || [];
            
            const dates = getDatesOfWeek(state.semaine, state.annee);
            const header = document.getElementById('plan-header');
            header.innerHTML = `<th class="p-2 border">Tournée / Flux</th>` + dates.map(d => `<th class="p-2 border text-center text-xs">${d}</th>`).join('');

            const body = document.getElementById('plan-body');
            // Filtrer les tournées selon paire/impaire
            const tourneesAffichees = state.data.tournees.filter(t => t.type === 'fixe' || (isPaire && t.type === 'paire') || (!isPaire && t.type === 'impaire'));

            body.innerHTML = tourneesAffichees.map(t => {
                return `<tr>
                    <td class="p-2 border font-bold bg-white">
                        ${t.nom} <br> 
                        <span class="px-2 py-0.5 rounded text-[10px] ${t.flux === 'OM' ? 'flux-om' : 'flux-cs'}">${t.flux}</span>
                    </td>
                    ${[0,1,2,3,4].map(dayIdx => {
                        const cell = state.data.planning[weekKey]?.[t.nom]?.[dayIdx] || {};
                        const checkC = (name) => agentsEnConges.includes(name) ? 'en-conge' : '';
                        return `<td class="p-1 border bg-white min-w-[120px]">
                            <select onchange="updatePlan('${t.nom}',${dayIdx},'ch',this.value)" class="w-full text-[10px] mb-1 p-1 border rounded ${checkC(cell.ch)}">
                                <option value="">Chauffeur</option>
                                ${state.data.agents.map(a => `<option ${cell.ch===a?'selected':''}>${a}</option>`).join('')}
                            </select>
                            <select onchange="updatePlan('${t.nom}',${dayIdx},'r1',this.value)" class="w-full text-[10px] mb-1 p-1 border rounded ${checkC(cell.r1)}">
                                <option value="">Ripeur 1</option>
                                ${state.data.agents.map(a => `<option ${cell.r1===a?'selected':''}>${a}</option>`).join('')}
                            </select>
                            <input type="text" placeholder="Obs/Vidage" onchange="updatePlan('${t.nom}',${dayIdx},'obs',this.value)" value="${cell.obs||''}" class="w-full text-[9px] p-1 border-none bg-slate-50">
                        </td>`
                    }).join('')}
                </tr>`;
            }).join('');
        }

        function updatePlan(tName, day, field, val) {
            const key = `${state.annee}_W${state.semaine}`;
            if(!state.data.planning[key]) state.data.planning[key] = {};
            if(!state.data.planning[key][tName]) state.data.planning[key][tName] = {};
            if(!state.data.planning[key][tName][day]) state.data.planning[key][tName][day] = {};
            state.data.planning[key][tName][day][field] = val;
            sync();
            renderPlanning();
        }

        // --- GESTION PARAMÈTRES ---
        function addParam(type) {
            const val = document.getElementById(`in-${type}`).value;
            if(!val) return;
            if(type === 'tournees') {
                const flux = document.getElementById('in-flux').value;
                const freq = document.getElementById('in-freq').value;
                state.data.tournees.push({nom: val, flux: flux, type: freq});
            } else {
                state.data[type].push(val);
            }
            sync(); renderAll();
        }

        function removeParam(type, index) {
            state.data[type].splice(index, 1);
            sync(); renderAll();
        }

        // --- NAVIGATION ---
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function renderAll() {
            renderPlanning();
            // Rendu listes paramètres
            ['agents', 'camions', 'tournees'].forEach(type => {
                const list = document.getElementById(`list-${type}`);
                list.innerHTML = state.data[type].map((item, i) => `
                    <li class="flex justify-between text-sm p-2 bg-white mb-1 rounded border">
                        ${typeof item === 'string' ? item : item.nom + ' (' + item.type + ')'}
                        <button onclick="removeParam('${type}', ${i})" class="text-red-500 font-bold">✕</button>
                    </li>
                `).join('');
            });
        }

        window.onload = load;
    </script>

    <header class="bg-blue-900 text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="font-black text-xl tracking-tighter">GRAND SUD COLLECTE</h1>
                <div id="status" class="text-[10px] uppercase opacity-60 font-bold">Connexion...</div>
            </div>
            <nav class="flex gap-6 font-bold text-sm uppercase">
                <button onclick="showTab('tab-plan')">Planning</button>
                <button onclick="showTab('tab-conges')">Congés</button>
                <button onclick="showTab('tab-params')">Paramètres</button>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4">
        
        <section id="tab-plan" class="tab-content active">
            <div class="flex flex-wrap gap-4 mb-6 bg-white p-4 rounded-xl shadow-sm items-center">
                <div class="flex items-center gap-2">
                    <label class="text-xs font-bold text-slate-400">ANNÉE</label>
                    <input type="number" value="2026" onchange="state.annee=this.value; renderPlanning()" class="border rounded p-1 w-20">
                </div>
                <div class="flex items-center gap-2">
                    <label class="text-xs font-bold text-slate-400">SEMAINE</label>
                    <button onclick="state.semaine--; renderPlanning()" class="px-2 bg-slate-100 rounded">◀</button>
                    <span class="font-bold w-8 text-center" id="week-num">1</span>
                    <button onclick="state.semaine++; renderPlanning()" class="px-2 bg-slate-100 rounded">▶</button>
                </div>
                <div class="ml-auto text-xs font-bold px-3 py-1 bg-slate-100 rounded-full">
                    Semaine <span id="pair-type">...</span>
                </div>
            </div>

            <div class="overflow-x-auto shadow-2xl rounded-xl border border-slate-200">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 text-slate-500 uppercase text-[10px] tracking-widest">
                        <tr id="plan-header"></tr>
                    </thead>
                    <tbody id="plan-body" class="text-xs"></tbody>
                </table>
            </div>
        </section>

        <section id="tab-params" class="tab-content">
            <div class="grid md:grid-cols-3 gap-6">
                <div class="bg-white p-4 rounded-xl shadow">
                    <h3 class="font-bold mb-4 text-blue-800 uppercase text-xs">Agents</h3>
                    <div class="flex gap-1 mb-4">
                        <input type="text" id="in-agents" class="border p-2 rounded text-sm flex-1">
                        <button onclick="addParam('agents')" class="bg-blue-600 text-white px-3 rounded">+</button>
                    </div>
                    <ul id="list-agents"></ul>
                </div>
                <div class="bg-white p-4 rounded-xl shadow">
                    <h3 class="font-bold mb-4 text-blue-800 uppercase text-xs">Camions</h3>
                    <div class="flex gap-1 mb-4">
                        <input type="text" id="in-camions" class="border p-2 rounded text-sm flex-1">
                        <button onclick="addParam('camions')" class="bg-blue-600 text-white px-3 rounded">+</button>
                    </div>
                    <ul id="list-camions"></ul>
                </div>
                <div class="bg-white p-4 rounded-xl shadow">
                    <h3 class="font-bold mb-4 text-blue-800 uppercase text-xs">Prédispositions Tournées</h3>
                    <input type="text" id="in-tournees" placeholder="Nom" class="border p-2 rounded text-sm w-full mb-1">
                    <div class="flex gap-1 mb-2">
                        <select id="in-flux" class="border p-2 rounded text-sm flex-1">
                            <option value="OM">OM (Gris)</option>
                            <option value="CS">CS (Jaune)</option>
                        </select>
                        <select id="in-freq" class="border p-2 rounded text-sm flex-1">
                            <option value="fixe">Toutes sem.</option>
                            <option value="paire">Sem. Paires</option>
                            <option value="impaire">Sem. Impaires</option>
                        </select>
                    </div>
                    <button onclick="addParam('tournees')" class="bg-blue-600 text-white p-2 rounded w-full">Ajouter Tournée</button>
                    <ul id="list-tournees" class="mt-4"></ul>
                </div>
            </div>
        </section>

        <section id="tab-conges" class="tab-content">
            <div class="bg-white p-6 rounded-xl shadow-sm border text-center">
                <h2 class="font-bold text-xl mb-4">Gestion des Congés</h2>
                <p class="text-slate-500 mb-6">Sélectionnez les agents absents pour le mois en cours.</p>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="conge-grid">
                    </div>
            </div>
        </section>

    </main>

    <script>
        // Mise à jour spécifique pour les semaines paires/impaires dans l'UI
        setInterval(() => {
            document.getElementById('week-num').innerText = state.semaine;
            document.getElementById('pair-type').innerText = (state.semaine % 2 === 0) ? "PAIRE" : "IMPAIRE";
        }, 100);
    </script>
</body>
</html>

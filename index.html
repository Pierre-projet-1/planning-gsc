<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSC - Système Expert Planning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .flux-om { background: #e2e8f0; color: #475569; }
        .flux-cs { background: #fef08a; color: #854d0e; }
        .conflict { color: #dc2626 !important; font-weight: 800; text-decoration: underline; }
        .day-cell { transition: all 0.2s; cursor: pointer; }
        .day-cell:hover { transform: scale(1.05); }
        .is-conge { background-color: #fca5a5 !important; border-color: #ef4444 !important; }
    </script>
</head>
<body class="bg-slate-100 min-h-screen font-sans text-slate-900">

    <script>
        const BIN_ID = "69b528beaa77b81da9e33a14"; 
        const API_KEY = "$2a$10$KM0Bk26gr5ZNVIpvSKTSIOs57V3dBxtizW1IjdbER1L/yjh24vaEq"; 
        const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        let state = {
            annee: 2026,
            semaine: 1,
            selectedAgentForConges: "",
            viewDateConges: new Date(),
            data: {
                agents: [],
                camions: [],
                tournees: [], // {nom, flux, type, jour} jour de 1 (Lun) à 5 (Ven)
                planning: {},
                conges: {} // { "NomAgent": ["YYYY-MM-DD", ...] }
            }
        };

        const JOURS_NOM = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi"];

        // --- CORE FUNCTIONS ---
        async function load() {
            document.getElementById('status').innerText = "⏳ Synchronisation...";
            try {
                const res = await fetch(`${URL}/latest`, { headers: { "X-Master-Key": API_KEY } });
                const json = await res.json();
                if (json.record) {
                    state.data = {
                        agents: json.record.agents || [],
                        camions: json.record.camions || [],
                        tournees: json.record.tournees || [],
                        planning: json.record.planning || {},
                        conges: json.record.conges || {}
                    };
                }
                renderAll();
                document.getElementById('status').innerText = "✅ Système prêt";
            } catch (err) {
                document.getElementById('status').innerText = "❌ Erreur réseau";
            }
        }

        async function sync() {
            document.getElementById('status').innerText = "⏳ Sauvegarde...";
            await fetch(URL, {
                method: 'PUT',
                headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
                body: JSON.stringify(state.data)
            });
            document.getElementById('status').innerText = "✅ Enregistré";
        }

        // --- CALCULS DATES ---
        function getDatesOfWeek(w, y) {
            let simple = new Date(y, 0, 1 + (w - 1) * 7);
            let dow = simple.getDay();
            let ISOweekStart = simple;
            if (dow <= 4) ISOweekStart.setDate(simple.getDate() - simple.getDay() + 1);
            else ISOweekStart.setDate(simple.getDate() + 8 - simple.getDay());
            
            let days = [];
            for (let i = 0; i < 5; i++) {
                let d = new Date(ISOweekStart);
                d.setDate(d.getDate() + i);
                days.push({
                    full: d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' }),
                    iso: d.toISOString().split('T')[0],
                    short: d.toLocaleDateString('fr-FR')
                });
            }
            return days;
        }

        // --- RENDU PLANNING ---
        function renderPlanning() {
            const isPaire = state.semaine % 2 === 0;
            const weekKey = `${state.annee}_W${state.semaine}`;
            const dates = getDatesOfWeek(state.semaine, state.annee);
            
            // Titre dynamique
            const monthName = new Date(state.annee, 0, 1 + (state.semaine - 1) * 7).toLocaleString('fr-FR', {month: 'long'});
            document.getElementById('planning-title').innerText = `Planning semaine n°${state.semaine} - ${monthName} ${state.annee}`;

            const body = document.getElementById('plan-body');
            body.innerHTML = "";

            dates.forEach((dateObj, dayIdx) => {
                const jourNum = dayIdx + 1; // 1=Lundi
                const tourneesDuJour = state.data.tournees.filter(t => 
                    t.jour == jourNum && t.type === (isPaire ? 'paire' : 'impaire')
                );

                // Agents occupés ce jour
                let agentsOccupesCeJour = [];
                tourneesDuJour.forEach(t => {
                    const row = state.data.planning[weekKey]?.[`${t.nom}_${dayIdx}`] || {};
                    if(row.ch) agentsOccupesCeJour.push(row.ch);
                    if(row.r1) agentsOccupesCeJour.push(row.r1);
                    if(row.r2) agentsOccupesCeJour.push(row.r2);
                });

                tourneesDuJour.forEach(t => {
                    const cellKey = `${t.nom}_${dayIdx}`;
                    const rowData = state.data.planning[weekKey]?.[cellKey] || {};
                    
                    const isConflict = (name) => {
                        if(!name) return "";
                        const congesAgent = state.data.conges[name] || [];
                        return congesAgent.includes(dateObj.iso) ? "conflict" : "";
                    };

                    // Calcul dispos
                    const dispos = state.data.agents.filter(a => {
                        const enCongé = (state.data.conges[a] || []).includes(dateObj.iso);
                        const dejaPris = agentsOccupesCeJour.includes(a);
                        return !enCongé && !dejaPris;
                    });

                    const tr = document.createElement('tr');
                    tr.className = "border-b hover:bg-slate-50 transition-colors text-[11px]";
                    tr.innerHTML = `
                        <td class="p-2 border bg-slate-50 font-bold">${dateObj.full}</td>
                        <td class="p-2 border font-bold uppercase">${t.nom}</td>
                        <td class="p-1 border text-center"><span class="px-2 py-0.5 rounded ${t.flux==='OM'?'flux-om':'flux-cs'}">${t.flux}</span></td>
                        <td class="p-1 border">
                            <select onchange="updatePlan('${cellKey}','camion',this.value)" class="w-full p-1 border rounded">
                                <option value="">---</option>
                                ${state.data.camions.map(c => `<option ${rowData.camion===c?'selected':''}>${c}</option>`).join('')}
                            </select>
                        </td>
                        <td class="p-1 border">
                            <select onchange="updatePlan('${cellKey}','ch',this.value)" class="w-full p-1 border rounded ${isConflict(rowData.ch)}">
                                <option value="">---</option>
                                ${state.data.agents.map(a => `<option ${rowData.ch===a?'selected':''}>${a}</option>`).join('')}
                            </select>
                        </td>
                        <td class="p-1 border">
                            <select onchange="updatePlan('${cellKey}','r1',this.value)" class="w-full p-1 border rounded ${isConflict(rowData.r1)}">
                                <option value="">---</option>
                                ${state.data.agents.map(a => `<option ${rowData.r1===a?'selected':''}>${a}</option>`).join('')}
                            </select>
                        </td>
                        <td class="p-1 border">
                            <select onchange="updatePlan('${cellKey}','r2',this.value)" class="w-full p-1 border rounded ${isConflict(rowData.r2)}">
                                <option value="">---</option>
                                ${state.data.agents.map(a => `<option ${rowData.r2===a?'selected':''}>${a}</option>`).join('')}
                            </select>
                        </td>
                        <td class="p-1 border">
                            <select onchange="updatePlan('${cellKey}','vidage',this.value)" class="w-full p-1 border rounded font-bold">
                                <option value="">---</option>
                                <option ${rowData.vidage==='Dépôt'?'selected':''}>Dépôt</option>
                                <option ${rowData.vidage==='DRIMM'?'selected':''}>DRIMM</option>
                            </select>
                        </td>
                        <td class="p-1 border"><input type="text" value="${rowData.info||''}" onchange="updatePlan('${cellKey}','info',this.value)" class="w-full p-1 text-[10px]"></td>
                        <td class="p-1 border"><input type="text" value="${rowData.autres||''}" onchange="updatePlan('${cellKey}','autres',this.value)" class="w-full p-1 text-[10px]"></td>
                        <td class="p-2 border text-[9px] text-emerald-600 font-bold leading-tight">${dispos.join(', ') || 'Aucun'}</td>
                    `;
                    body.appendChild(tr);
                });
            });
        }

        function updatePlan(cellKey, field, val) {
            const weekKey = `${state.annee}_W${state.semaine}`;
            if(!state.data.planning[weekKey]) state.data.planning[weekKey] = {};
            if(!state.data.planning[weekKey][cellKey]) state.data.planning[weekKey][cellKey] = {};
            state.data.planning[weekKey][cellKey][field] = val;
            sync();
            renderPlanning();
        }

        // --- GESTION PARAMETRES ---
        function addAgent() {
            const name = document.getElementById('in-agent').value.trim();
            if(name) { state.data.agents.push(name); sync(); renderAll(); document.getElementById('in-agent').value = ""; }
        }
        function addCamion() {
            const name = document.getElementById('in-camion').value.trim();
            if(name) { state.data.camions.push(name); sync(); renderAll(); document.getElementById('in-camion').value = ""; }
        }
        function addTournee() {
            const nom = document.getElementById('t-nom').value.trim();
            const flux = document.getElementById('t-flux').value;
            const type = document.getElementById('t-type').value;
            const jour = document.getElementById('t-jour').value;
            if(nom) {
                state.data.tournees.push({ nom, flux, type, jour });
                sync(); renderAll();
            }
        }
        function removeTournee(idx) { state.data.tournees.splice(idx, 1); sync(); renderAll(); }

        // --- GESTION CONGES ---
        function renderConges() {
            const container = document.getElementById('calendar-container');
            const selector = document.getElementById('agent-conge-select');
            
            // Liste des agents
            selector.innerHTML = `<option value="">-- Choisir un Agent --</option>` + 
                state.data.agents.map(a => `<option value="${a}" ${state.selectedAgentForConges===a?'selected':''}>${a}</option>`).join('');

            if(!state.selectedAgentForConges) {
                container.innerHTML = `<div class="p-20 text-center text-slate-400">Sélectionnez un agent pour gérer ses congés.</div>`;
                return;
            }

            const d = state.viewDateConges;
            const month = d.getMonth();
            const year = d.getFullYear();
            
            document.getElementById('current-month-display').innerText = d.toLocaleDateString('fr-FR', {month: 'long', year: 'numeric'}).toUpperCase();

            const firstDay = new Date(year, month, 1).getDay() || 7;
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            let html = `<div class="grid grid-cols-7 gap-1 bg-slate-200 border p-1 rounded">`;
            const labelJours = ["Lun", "Mar", "Mer", "Jeu", "Ven", "Sam", "Dim"];
            labelJours.forEach(j => html += `<div class="text-center font-bold text-[10px] py-2 bg-slate-100">${j}</div>`);

            for(let i = 1; i < firstDay; i++) html += `<div class="bg-white/50"></div>`;

            for(let day = 1; day <= daysInMonth; day++) {
                const dateIso = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                const isConge = (state.data.conges[state.selectedAgentForConges] || []).includes(dateIso);
                html += `
                    <div onclick="toggleConge('${dateIso}')" class="day-cell h-16 border bg-white p-1 text-xs font-bold ${isConge ? 'is-conge' : ''}">
                        ${day}
                    </div>`;
            }
            html += `</div>`;
            container.innerHTML = html;
        }

        function toggleConge(iso) {
            const agent = state.selectedAgentForConges;
            if(!agent) return;
            if(!state.data.conges[agent]) state.data.conges[agent] = [];
            
            const index = state.data.conges[agent].indexOf(iso);
            if(index > -1) state.data.conges[agent].splice(index, 1);
            else state.data.conges[agent].push(iso);
            
            sync();
            renderConges();
        }

        function changeMonth(offset) {
            state.viewDateConges.setMonth(state.viewDateConges.getMonth() + offset);
            renderConges();
        }

        // --- NAVIGATION ---
        function renderAll() {
            renderPlanning();
            renderConges();
            
            // Listes Paramètres
            document.getElementById('list-agents').innerHTML = state.data.agents.map(a => `<div class="flex justify-between p-1 bg-white border mb-1 rounded text-xs">${a}</div>`).join('');
            document.getElementById('list-camions').innerHTML = state.data.camions.map(c => `<div class="flex justify-between p-1 bg-white border mb-1 rounded text-xs">${c}</div>`).join('');
            
            const listT = (type) => state.data.tournees
                .map((t, i) => t.type === type ? `
                    <div class="flex justify-between items-center p-2 bg-white border mb-1 rounded text-xs shadow-sm">
                        <span><b>${JOURS_NOM[t.jour-1]}</b> : ${t.nom} (${t.flux})</span>
                        <button onclick="removeTournee(${i})" class="text-red-500 font-bold">✕</button>
                    </div>` : '').join('');
            
            document.getElementById('param-t-impaires').innerHTML = listT('impaire');
            document.getElementById('param-t-paires').innerHTML = listT('paire');
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            renderAll();
        }

        window.onload = load;
    </script>

    <header class="bg-blue-950 text-white p-4 shadow-2xl sticky top-0 z-50">
        <div class="max-w-[1600px] mx-auto flex justify-between items-center">
            <div>
                <h1 class="font-black text-2xl tracking-tighter">GSC <span class="text-blue-400">PLANNING</span></h1>
                <div id="status" class="text-[10px] font-mono opacity-70 italic text-blue-200">Initialisation...</div>
            </div>
            <nav class="flex gap-2">
                <button onclick="showTab('tab-plan')" class="px-4 py-2 hover:bg-blue-800 rounded-lg font-bold text-sm uppercase transition-all">Planning</button>
                <button onclick="showTab('tab-conges')" class="px-4 py-2 hover:bg-blue-800 rounded-lg font-bold text-sm uppercase transition-all">Congés</button>
                <button onclick="showTab('tab-params')" class="px-4 py-2 hover:bg-blue-800 rounded-lg font-bold text-sm uppercase transition-all">Paramètres</button>
            </nav>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto p-4">

        <section id="tab-plan" class="tab-content active">
            <div class="flex items-center justify-between mb-6 bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex items-center gap-4">
                    <button onclick="state.semaine--; renderAll()" class="p-3 bg-slate-100 rounded-xl hover:bg-blue-100 text-blue-600 transition-all font-bold">◀</button>
                    <div class="text-center min-w-[300px]">
                        <h2 id="planning-title" class="text-xl font-black text-slate-800 uppercase tracking-tight">Planning...</h2>
                        <span class="text-[10px] font-bold text-slate-400 tracking-[0.2em]">GRAND SUD COLLECTE</span>
                    </div>
                    <button onclick="state.semaine++; renderAll()" class="p-3 bg-slate-100 rounded-xl hover:bg-blue-100 text-blue-600 transition-all font-bold">▶</button>
                </div>
                <div class="flex gap-4 items-center">
                    <div class="text-right">
                        <div class="text-[10px] font-bold text-slate-400">ANNÉE</div>
                        <input type="number" value="2026" onchange="state.annee=parseInt(this.value); renderAll()" class="border-b-2 border-blue-200 text-lg font-black w-20 text-center outline-none focus:border-blue-600">
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-2xl border border-slate-200 overflow-hidden">
                <table class="w-full border-collapse">
                    <thead>
                        <tr class="bg-slate-800 text-white text-[10px] uppercase tracking-widest">
                            <th class="p-3 border border-slate-700">Jour</th>
                            <th class="p-3 border border-slate-700">Tournée</th>
                            <th class="p-3 border border-slate-700">Flux</th>
                            <th class="p-3 border border-slate-700">Camion</th>
                            <th class="p-3 border border-slate-700">Chauffeur</th>
                            <th class="p-3 border border-slate-700">Ripeur 1</th>
                            <th class="p-3 border border-slate-700">Ripeur 2</th>
                            <th class="p-3 border border-slate-700">Vidage</th>
                            <th class="p-3 border border-slate-700">Information</th>
                            <th class="p-3 border border-slate-700">Autres</th>
                            <th class="p-3 border border-slate-700 w-48">Personnel Dispo</th>
                        </tr>
                    </thead>
                    <tbody id="plan-body"></tbody>
                </table>
            </div>
        </section>

        <section id="tab-conges" class="tab-content">
            <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
                <div class="p-6 bg-slate-800 text-white flex justify-between items-center">
                    <div>
                        <h2 class="text-2xl font-black tracking-tighter">Gestion des Absences</h2>
                        <p class="text-xs text-slate-400">Cliquez sur un jour pour basculer l'état (Congé/Actif)</p>
                    </div>
                    <select id="agent-conge-select" onchange="state.selectedAgentForConges=this.value; renderConges()" class="bg-slate-700 text-white border border-slate-600 p-2 rounded-xl font-bold outline-none">
                    </select>
                </div>
                
                <div class="p-6">
                    <div class="flex justify-between items-center mb-6">
                        <button onclick="changeMonth(-1)" class="p-2 hover:bg-slate-100 rounded-full font-bold">◀</button>
                        <h3 id="current-month-display" class="text-xl font-black text-blue-900 tracking-widest">MOIS</h3>
                        <button onclick="changeMonth(1)" class="p-2 hover:bg-slate-100 rounded-full font-bold">▶</button>
                    </div>
                    <div id="calendar-container"></div>
                </div>
            </div>
        </section>

        <section id="tab-params" class="tab-content">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                
                <div class="space-y-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border">
                        <h3 class="font-black text-xs uppercase mb-4 text-blue-600">Personnel & Matériel</h3>
                        <div class="flex gap-2 mb-4">
                            <input type="text" id="in-agent" placeholder="Nom Agent" class="flex-1 border p-2 rounded-xl text-sm">
                            <button onclick="addAgent()" class="bg-blue-600 text-white px-4 rounded-xl font-bold">+</button>
                        </div>
                        <div id="list-agents" class="max-h-40 overflow-y-auto mb-6"></div>
                        
                        <div class="flex gap-2 mb-4">
                            <input type="text" id="in-camion" placeholder="N° Camion" class="flex-1 border p-2 rounded-xl text-sm">
                            <button onclick="addCamion()" class="bg-blue-600 text-white px-4 rounded-xl font-bold">+</button>
                        </div>
                        <div id="list-camions" class="max-h-40 overflow-y-auto"></div>
                    </div>
                </div>

                <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border">
                    <h3 class="font-black text-xs uppercase mb-4 text-blue-600 text-center italic">Prédisposition des Tournées</h3>
                    
                    <div class="grid grid-cols-2 md:grid-cols-5 gap-2 mb-6 bg-slate-50 p-4 rounded-2xl border-2 border-dashed border-slate-200">
                        <input type="text" id="t-nom" placeholder="Nom Tournée" class="border p-2 rounded-xl text-sm col-span-2">
                        <select id="t-flux" class="border p-2 rounded-xl text-sm">
                            <option value="OM">Flux OM</option>
                            <option value="CS">Flux CS</option>
                        </select>
                        <select id="t-jour" class="border p-2 rounded-xl text-sm">
                            <option value="1">Lundi</option>
                            <option value="2">Mardi</option>
                            <option value="3">Mercredi</option>
                            <option value="4">Jeudi</option>
                            <option value="5">Vendredi</option>
                        </select>
                        <select id="t-type" class="border p-2 rounded-xl text-sm font-bold text-blue-600">
                            <option value="impaire">S. IMPAIRE</option>
                            <option value="paire">S. PAIRE</option>
                        </select>
                        <button onclick="addTournee()" class="bg-blue-950 text-white p-2 rounded-xl font-bold col-span-full uppercase text-xs">Ajouter à la prédisposition</button>
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <h4 class="text-center font-black text-[10px] bg-slate-800 text-white py-1 mb-2 rounded">SEMAINES IMPAIRES</h4>
                            <div id="param-t-impaires"></div>
                        </div>
                        <div>
                            <h4 class="text-center font-black text-[10px] bg-blue-600 text-white py-1 mb-2 rounded">SEMAINES PAIRES</h4>
                            <div id="param-t-paires"></div>
                        </div>
                    </div>
                </div>

            </div>
        </section>

    </main>

</body>
</html>
